  const [list,setList]=useState([...disciplines]);
  const [newD,setNewD]=useState("");
  const add=()=>{const t=newD.trim();if(!t||list.includes(t))return;setList(l=>[...l,t]);setNewD("");};
  const remove=d=>{const cnt=candidates.filter(c=>c.discipline===d).length;if(cnt>0){showToast(`Can't remove "${d}" — ${cnt} candidate${cnt>1?"s":""} assigned`);return;}setList(l=>l.filter(x=>x!==d));};
  return (
    <div className="modal" onClick={onClose}>
      <div className="modal-inner sm" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><div><div style={{fontFamily:"var(--mono)",fontSize:10,textTransform:"uppercase",letterSpacing:"0.14em",color:"var(--ink-3)",marginBottom:6}}>Settings</div><div style={{fontFamily:"var(--serif)",fontSize:26,letterSpacing:"-0.015em"}}>Manage Disciplines</div></div><button className="btn icon" onClick={onClose}><Icon name="x" className="icon-sm"/></button></div>
        <div className="modal-body">
          <div className="discipline-list">
            {list.map(d=>{const cnt=candidates.filter(c=>c.discipline===d).length;return(
              <div key={d} className="discipline-item">
                <span style={{width:6,height:6,borderRadius:"50%",background:"var(--ink-3)",opacity:.4,flexShrink:0,display:"inline-block"}}/>
                <span style={{flex:1,fontSize:13,color:"var(--ink)"}}>{d}</span>
                <span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--ink-3)"}}>{cnt} candidate{cnt!==1?"s":""}</span>
                <button className="btn icon sm" onClick={()=>remove(d)} style={{width:26,height:26,color:"var(--ink-3)"}}><Icon name="x" className="icon-sm"/></button>
              </div>
            );})}
          </div>
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <input className="form-input" style={{flex:1}} placeholder="New discipline name…" value={newD} onChange={e=>setNewD(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
            <button className="btn accent" onClick={add} disabled={!newD.trim()}><Icon name="plus" className="icon-sm"/>Add</button>
          </div>
        </div>
        <div className="modal-footer"><button className="btn" onClick={onClose}>Cancel</button><button className="btn primary" onClick={()=>{onSave(list);showToast("Disciplines updated");onClose();}}>Save changes</button></div>
      </div>
    </div>
  );
};

/* ── THEME MAPS ── */
const ACCENT_MAP={
  terracotta:{accent:"oklch(0.56 0.16 35)",accent2:"oklch(0.48 0.17 35)",soft:"oklch(0.95 0.04 35)",ink:"oklch(0.36 0.13 35)"},
  indigo:{accent:"oklch(0.5 0.14 270)",accent2:"oklch(0.42 0.16 270)",soft:"oklch(0.94 0.04 270)",ink:"oklch(0.35 0.12 270)"},
  moss:{accent:"oklch(0.5 0.1 150)",accent2:"oklch(0.42 0.12 150)",soft:"oklch(0.94 0.04 150)",ink:"oklch(0.35 0.1 150)"},
  ink:{accent:"oklch(0.22 0.012 60)",accent2:"oklch(0.12 0.012 60)",soft:"oklch(0.92 0.01 60)",ink:"oklch(0.22 0.012 60)"},
};
const PAPER_MAP={
  warm:{p:"oklch(0.985 0.006 85)",p2:"oklch(0.965 0.008 80)",p3:"oklch(0.93 0.01 78)"},
  cool:{p:"oklch(0.985 0.004 240)",p2:"oklch(0.965 0.006 240)",p3:"oklch(0.93 0.008 240)"},
  neutral:{p:"oklch(0.985 0 0)",p2:"oklch(0.965 0 0)",p3:"oklch(0.93 0 0)"},
};

/* ── ROOT APP ── */
const App = () => {
  const [loggedIn,setLoggedIn]=useState(()=>!!load("ats.user",null));
  const [user,setUser]=useState(()=>load("ats.user",null));
  const [candidates,setCandidates]=useState(()=>load("ats.candidates",DEMO_CANDIDATES));
  const [lists,setLists]=useState(()=>load("ats.lists",DEMO_LISTS));
  const [disciplines,setDisciplines]=useState(()=>load("ats.disciplines",DEFAULT_DISCIPLINES));
  const [route,setRoute]=useState({view:"roster",nav:"all",id:null});
  const [listView,setListView]=useState("grid");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [activeList,setActiveList]=useState(null);
  const [filterState,setFilterState]=useState({query:"",discipline:null,availability:null,minYrs:null,stars:null,sort:"name"});
  const [tweaks,setTweaks]=useState({accent:"terracotta",density:"comfortable",paperTone:"warm"});
  const [tweaksOpen,setTweaksOpen]=useState(false);
  const [modal,setModal]=useState(null);
  const [toasts,setToasts]=useState([]);
  const avatarRef=useRef(null);

  const showToast=useCallback((msg)=>{const id=Date.now();setToasts(t=>[...t,{id,msg}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2800);},[]);

  useEffect(()=>{save("ats.candidates",candidates);},[candidates]);
  useEffect(()=>{save("ats.lists",lists);},[lists]);
  useEffect(()=>{save("ats.disciplines",disciplines);},[disciplines]);
  useEffect(()=>{if(user)save("ats.user",user);else localStorage.removeItem("ats.user");},[user]);

  useEffect(()=>{
    const root=document.documentElement;
    const a=ACCENT_MAP[tweaks.accent]||ACCENT_MAP.terracotta;
    root.style.setProperty("--accent",a.accent);root.style.setProperty("--accent-2",a.accent2);root.style.setProperty("--accent-soft",a.soft);root.style.setProperty("--accent-ink",a.ink);
    const p=PAPER_MAP[tweaks.paperTone]||PAPER_MAP.warm;
    root.style.setProperty("--paper",p.p);root.style.setProperty("--paper-2",p.p2);root.style.setProperty("--paper-3",p.p3);
    document.body.style.fontSize=tweaks.density==="compact"?"13px":"14px";
  },[tweaks]);

  useEffect(()=>{
    const handler=e=>{
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
      if(route.view==="detail"&&route.id){
        const i=candidates.findIndex(c=>c.id===route.id);
        if(e.key==="j")navigateCandidate(candidates[(i+1)%candidates.length].id);
        if(e.key==="k")navigateCandidate(candidates[(i-1+candidates.length)%candidates.length].id);
        if(e.key==="s")toggleStar(route.id);
        if(e.key==="Escape")closeCandidate();
      }
      if(e.key==="/"){ e.preventDefault(); document.querySelector(".topbar input")?.focus(); }
      if(e.key==="Escape"&&modal)setModal(null);
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[route,candidates,modal]);

  useEffect(()=>{
    if(modal!=="avatarMenu")return;
    const h=e=>{if(avatarRef.current&&!avatarRef.current.contains(e.target))setModal(null);};
    setTimeout(()=>document.addEventListener("mousedown",h),0);
    return()=>document.removeEventListener("mousedown",h);
  },[modal]);

  const handleLogin=u=>{setUser(u);setLoggedIn(true);};
  const handleLogout=()=>{setUser(null);setLoggedIn(false);setModal(null);localStorage.removeItem("ats.user");};

  const openCandidate=id=>setRoute({view:"detail",nav:route.nav,id});
  const closeCandidate=()=>setRoute({...route,view:"roster",id:null});
  const navigateCandidate=id=>setRoute({...route,id});
  const toggleStar=id=>setCandidates(cs=>cs.map(c=>c.id===id?{...c,shortlist:!c.shortlist}:c));
  const setStage=(id,stage)=>setCandidates(cs=>cs.map(c=>c.id===id?{...c,stage}:c));
  const addNote=(id,text)=>setCandidates(cs=>cs.map(c=>c.id===id?{...c,notes:[{by:user?.name||"You",at:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),text},...(c.notes||[])]}:c));
  const addCandidate=c=>setCandidates(cs=>[c,...cs]);
  const updateCandidate=updated=>setCandidates(cs=>cs.map(c=>c.id===updated.id?updated:c));
  const addList=l=>setLists(ls=>[...ls,l]);

  const goNav=nav=>{setRoute({view:nav==="lists"?"lists":"roster",nav,id:null});setActiveList(null);setSidebarOpen(false);};

  const shortlistCount=candidates.filter(c=>c.shortlist).length;
  const pipelineCount=candidates.filter(c=>c.stage!=="Archived"&&c.stage!=="Sourced").length;
  const archivedCount=candidates.filter(c=>c.stage==="Archived").length;
  const currentCandidate=route.id?candidates.find(c=>c.id===route.id):null;
  const userInitials=(user?.name||"RM").split(" ").map(p=>p[0]).slice(0,2).join("").toUpperCase();

  if(!loggedIn) return <HomePage onLogin={handleLogin}/>;

  return (
    <div className="app">
      {/* TOPBAR */}
      <div className="topbar">
        <button className="btn icon menu-btn" onClick={()=>setSidebarOpen(o=>!o)}><Icon name="menu" className="icon-sm"/></button>
        <div className="brand" onClick={()=>goNav("all")}><span className="dot"/>Roladex<span className="mono">ATS · v0.3</span></div>
        <div className="search"><Icon name="search" className="icon-sm"/><input placeholder="Search candidates, skills, studios…" value={filterState.query} onChange={e=>setFilterState(s=>({...s,query:e.target.value}))}/><span className="kbd">/</span></div>
        <div className="spacer"/>
        <div className="topbar-actions">
          <button className="btn icon" onClick={()=>showToast("No new notifications")}><Icon name="bell" className="icon-sm"/></button>
          <button className="btn icon" onClick={()=>setModal("disciplines")}><Icon name="settings" className="icon-sm"/></button>
          <button className="btn sm" onClick={()=>setModal("addCandidate")} style={{gap:6}}><Icon name="plus" className="icon-sm"/>Add</button>
          <div ref={avatarRef} style={{position:"relative"}}>
            <div className="avatar" onClick={()=>setModal(m=>m==="avatarMenu"?null:"avatarMenu")} title={user?.name}>{userInitials}</div>
            {modal==="avatarMenu"&&(
              <div className="avatar-menu">
                <div style={{padding:"10px 12px 8px",borderBottom:"1px solid var(--rule-soft)",marginBottom:4}}>
                  <div style={{fontWeight:600,fontSize:13,color:"var(--ink)"}}>{user?.name}</div>
                  <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--ink-3)",marginTop:2}}>{user?.email}</div>
                  {user?.title&&<div style={{fontSize:11,color:"var(--ink-3)",marginTop:2}}>{user.title}</div>}
                </div>
                <button className="menu-item" onClick={()=>{setTweaksOpen(o=>!o);setModal(null);}}><Icon name="settings" className="icon-sm"/>Appearance</button>
                <hr/>
                <button className="menu-item danger" onClick={handleLogout}><Icon name="logout" className="icon-sm"/>Sign out</button>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* SIDEBAR */}
      <div className={"sidebar"+(sidebarOpen?" open":"")}>
        <div className="nav-label">Roster</div>
        <button className={"nav-item"+(route.view==="roster"&&route.nav==="all"?" active":"")} onClick={()=>goNav("all")}><Icon name="users" className="icon-sm"/>All candidates<span className="count">{candidates.length}</span></button>
        <button className={"nav-item"+(route.view==="roster"&&route.nav==="shortlist"?" active":"")} onClick={()=>goNav("shortlist")}><Icon name="starFill" className="icon-sm"/>Shortlist<span className="count">{shortlistCount}</span></button>
        <button className={"nav-item"+(route.view==="roster"&&route.nav==="pipeline"?" active":"")} onClick={()=>goNav("pipeline")}><Icon name="inbox" className="icon-sm"/>Active pipeline<span className="count">{pipelineCount}</span></button>
        <button className={"nav-item"+(route.view==="roster"&&route.nav==="archived"?" active":"")} onClick={()=>goNav("archived")}><Icon name="archive" className="icon-sm"/>Archive<span className="count">{archivedCount}</span></button>
        <div className="nav-section">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 10px 8px"}}>
            <div className="nav-label" style={{padding:0}}>Collections</div>
            <button style={{color:"var(--accent)",fontSize:18,lineHeight:1}} onClick={()=>setModal("newList")}>+</button>
          </div>
          <button className={"nav-item"+(route.view==="lists"&&!activeList?" active":"")} onClick={()=>goNav("lists")}><Icon name="folder" className="icon-sm"/>All lists<span className="count">{lists.length}</span></button>
          {lists.slice(0,4).map(l=>(
            <button key={l.id} className={"nav-item"+(activeList===l.id?" active":"")} onClick={()=>{setRoute({view:"lists",nav:"lists",id:null});setActiveList(l.id);setSidebarOpen(false);}}>
              <span className="dot-small"/><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.name}</span><span className="count">{l.count}</span>
            </button>
          ))}
        </div>
        <div className="nav-section">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 10px 8px"}}>
            <div className="nav-label" style={{padding:0}}>Disciplines</div>
            <button style={{color:"var(--accent)",fontSize:16,lineHeight:1}} onClick={()=>setModal("disciplines")}>⚙</button>
          </div>
          {disciplines.map(d=>{
            const cnt=candidates.filter(c=>c.discipline===d).length;
            return <button key={d} className={"nav-item"+(filterState.discipline===d?" active":"")} onClick={()=>{setFilterState(s=>({...s,discipline:s.discipline===d?null:d}));goNav("all");}}><span className="dot-small"/>{d}<span className="count">{cnt}</span></button>;
          })}
        </div>
      </div>

      {/* MAIN */}
      <div className="main">
        {route.view==="detail"&&currentCandidate ? (
          <CandidateDetail c={currentCandidate} candidates={candidates} disciplines={disciplines} onBack={closeCandidate} onToggleStar={toggleStar} onSetStage={setStage} onAddNote={addNote} onNavigate={navigateCandidate} onUpdate={updateCandidate} showToast={showToast}/>
        ) : route.view==="lists" ? (
          <Lists lists={lists} candidates={candidates} activeList={activeList} setActiveList={setActiveList} onOpenCandidate={openCandidate} onNewList={()=>setModal("newList")} showToast={showToast} setLists={setLists}/>
        ) : (
          <Roster candidates={candidates} view={listView} setView={setListView} onOpen={openCandidate} onToggleStar={toggleStar} filterState={filterState} setFilterState={setFilterState} currentNav={route.nav} disciplines={disciplines} onAddCandidate={()=>setModal("addCandidate")} showToast={showToast}/>
        )}
      </div>

      {sidebarOpen&&<div style={{position:"fixed",inset:0,background:"oklch(0 0 0/.2)",zIndex:20}} onClick={()=>setSidebarOpen(false)}/>}

      {/* TWEAKS */}
      <div className={"tweaks-panel"+(tweaksOpen?" open":"")}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h3 style={{margin:0}}>Appearance</h3>
          <button className="btn icon" style={{width:22,height:22}} onClick={()=>setTweaksOpen(false)}><Icon name="x" className="icon-sm"/></button>
        </div>
        <div className="row"><label>Accent color</label><div className="swatches">{Object.entries(ACCENT_MAP).map(([k,v])=><button key={k} className={"swatch"+(tweaks.accent===k?" active":"")} style={{background:v.accent}} onClick={()=>setTweaks(t=>({...t,accent:k}))} title={k}/>)}</div></div>
        <div className="row"><label>Paper tone</label><div className="swatches">{Object.entries(PAPER_MAP).map(([k,v])=><button key={k} className={"swatch"+(tweaks.paperTone===k?" active":"")} style={{background:v.p,border:"1px solid var(--rule)"}} onClick={()=>setTweaks(t=>({...t,paperTone:k}))} title={k}/>)}</div></div>
        <div className="row"><label>Density</label><div style={{display:"flex",gap:4}}>{["comfortable","compact"].map(d=><button key={d} className={"filter-pill"+(tweaks.density===d?" active":"")} onClick={()=>setTweaks(t=>({...t,density:d}))} style={{fontSize:11,padding:"3px 8px"}}>{d}</button>)}</div></div>
      </div>

      {/* MODALS */}
      {modal==="addCandidate"&&<AddCandidateModal onClose={()=>setModal(null)} onAdd={addCandidate} disciplines={disciplines} showToast={showToast}/>}
      {modal==="disciplines"&&<ManageDisciplinesModal disciplines={disciplines} candidates={candidates} onClose={()=>setModal(null)} onSave={setDisciplines} showToast={showToast}/>}
      {modal==="newList"&&(
        <div className="modal" onClick={()=>setModal(null)}>
          <div className="modal-inner sm" onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><div style={{fontFamily:"var(--serif)",fontSize:26,letterSpacing:"-0.015em"}}>New List</div><button className="btn icon" onClick={()=>setModal(null)}><Icon name="x" className="icon-sm"/></button></div>
            <NewListBody onClose={()=>setModal(null)} onAdd={addList} showToast={showToast}/>
          </div>
        </div>
      )}
      <Toast toasts={toasts}/>
    </div>
  );
};

const NewListBody = ({ onClose, onAdd, showToast }) => {
  const [name,setName]=useState("");
  return (
    <>
      <div className="modal-body"><div className="form-group"><label className="form-label">List name</label><input className="form-input" placeholder="e.g. Q3 Motion shortlist" autoFocus value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&name.trim()&&(onAdd({id:"l"+Date.now(),name:name.trim(),count:0,updated:"Today",ids:[]}),showToast("List created"),onClose())}/></div></div>
      <div className="modal-footer"><button className="btn" onClick={onClose}>Cancel</button><button className="btn accent" disabled={!name.trim()} onClick={()=>{onAdd({id:"l"+Date.now(),name:name.trim(),count:0,updated:"Today",ids:[]});showToast("List created");onClose();}}><Icon name="plus" className="icon-sm"/>Create list</button></div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
