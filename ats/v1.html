<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Roladex — Portfolio ATS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--paper:oklch(0.985 0.006 85);--paper-2:oklch(0.965 0.008 80);--paper-3:oklch(0.93 0.01 78);--paper-4:oklch(0.89 0.012 78);--rule:oklch(0.88 0.012 75);--rule-soft:oklch(0.92 0.01 75);--ink:oklch(0.18 0.012 60);--ink-2:oklch(0.40 0.012 60);--ink-3:oklch(0.56 0.012 60);--ink-4:oklch(0.72 0.012 60);--accent:oklch(0.56 0.16 35);--accent-2:oklch(0.48 0.17 35);--accent-soft:oklch(0.95 0.04 35);--accent-ink:oklch(0.36 0.13 35);--ok:oklch(0.6 0.12 155);--warn:oklch(0.7 0.14 70);--radius:6px;--radius-lg:10px;--sans:"Inter",ui-sans-serif,system-ui,-apple-system,sans-serif;--mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;--serif:"Instrument Serif","Iowan Old Style",Georgia,ui-serif,serif;--shadow-sm:0 1px 0 oklch(0.88 0.012 75);--shadow-md:0 1px 2px oklch(0 0 0/.04),0 8px 24px oklch(0 0 0/.08);--shadow-lg:0 2px 4px oklch(0 0 0/.04),0 20px 48px oklch(0 0 0/.14)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;font-size:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}

/* HOME */
.home{min-height:100vh;display:grid;grid-template-rows:64px 1fr;background:var(--paper)}
.home-nav{display:flex;align-items:center;padding:0 40px;border-bottom:1px solid var(--rule);gap:32px}
.home-nav .brand{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-size:24px;letter-spacing:-0.015em}
.home-nav .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);display:inline-block;box-shadow:0 0 0 3px var(--accent-soft)}
.home-nav .brand .mono{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-3);padding:2px 6px;border:1px solid var(--rule);border-radius:3px}
.home-nav .spacer{flex:1}
.home-nav .nav-links{display:flex;gap:8px;align-items:center}
.home-body{display:grid;grid-template-columns:1fr 480px;min-height:calc(100vh - 64px)}
.hero-section{padding:80px 80px 60px;display:flex;flex-direction:column;justify-content:center;gap:36px;border-right:1px solid var(--rule);background:linear-gradient(135deg,var(--paper) 0%,var(--paper-2) 100%);position:relative;overflow:hidden}
.hero-section::before{content:"";position:absolute;top:-80px;right:-80px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,var(--accent-soft) 0%,transparent 70%);opacity:.6;pointer-events:none}
.hero-eyebrow{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:var(--accent);display:flex;align-items:center;gap:10px}
.hero-eyebrow::before{content:"";width:20px;height:1px;background:var(--accent)}
.hero-title{font-family:var(--serif);font-size:clamp(42px,5vw,72px);line-height:1.0;letter-spacing:-0.03em;color:var(--ink)}
.hero-title em{font-style:italic;color:var(--accent)}
.hero-body{font-size:18px;line-height:1.6;color:var(--ink-2);max-width:50ch}
.hero-stats{display:flex;gap:32px;padding-top:32px;border-top:1px solid var(--rule-soft)}
.hero-stat .n{font-family:var(--serif);font-size:36px;color:var(--ink);letter-spacing:-0.02em}
.hero-stat .l{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-3);margin-top:2px}
.feature-chips{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.feature-chip{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--rule);border-radius:var(--radius-lg);background:var(--paper);font-size:13px;color:var(--ink-2)}
.feature-chip .ic{width:28px;height:28px;border-radius:50%;background:var(--accent-soft);display:grid;place-items:center;flex-shrink:0;color:var(--accent)}
.demo-cred{background:var(--paper-2);border:1px solid var(--rule);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px}
.demo-cred .dc-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);margin-bottom:8px}
.demo-cred .dc-row{display:flex;gap:16px;font-size:12px;color:var(--ink-2)}
.demo-cred .dc-field{display:flex;gap:6px;align-items:center}
.demo-cred .dc-key{font-family:var(--mono);font-size:10px;color:var(--ink-3)}
.demo-cred .dc-val{font-weight:500;color:var(--ink);font-family:var(--mono);font-size:11px}
.login-panel{display:flex;flex-direction:column;justify-content:center;align-items:stretch;padding:60px 52px;background:var(--paper)}
.login-panel-inner{max-width:380px;width:100%;margin:0 auto}
.login-heading{font-family:var(--serif);font-size:34px;letter-spacing:-0.02em;color:var(--ink);margin-bottom:6px}
.login-sub{font-size:14px;color:var(--ink-3);margin-bottom:32px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-3);margin-bottom:7px}
.form-input{width:100%;border:1px solid var(--rule);border-radius:var(--radius);padding:10px 13px;background:var(--paper-2);font-size:14px;color:var(--ink);outline:none;transition:all .12s}
.form-input:focus{border-color:var(--ink);background:var(--paper);box-shadow:0 0 0 3px oklch(0 0 0/.04)}
.form-input.error{border-color:oklch(0.55 0.16 15)}
.login-error{font-size:12px;color:oklch(0.55 0.16 15);margin-bottom:14px;padding:8px 12px;border:1px solid oklch(0.85 0.08 15);border-radius:var(--radius);background:oklch(0.97 0.02 15)}
.login-divider{display:flex;align-items:center;gap:14px;margin:22px 0;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-4)}
.login-divider::before,.login-divider::after{content:"";flex:1;height:1px;background:var(--rule)}
.login-footer{margin-top:28px;padding-top:22px;border-top:1px solid var(--rule-soft);font-size:12px;color:var(--ink-3);text-align:center}
.login-footer a{color:var(--accent);cursor:pointer}

/* APP */
.app{display:grid;grid-template-columns:232px 1fr;grid-template-rows:52px 1fr;grid-template-areas:"topbar topbar" "sidebar main";height:100vh;width:100vw;overflow:hidden}
.topbar{grid-area:topbar;display:flex;align-items:center;gap:16px;padding:0 18px;border-bottom:1px solid var(--rule);background:var(--paper);position:relative;z-index:10}
.topbar .brand{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-size:22px;letter-spacing:-0.015em;cursor:pointer}
.topbar .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);display:inline-block;box-shadow:0 0 0 3px var(--accent-soft)}
.topbar .brand .mono{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-3);margin-left:4px;padding:2px 6px;border:1px solid var(--rule);border-radius:3px}
.topbar .search{flex:1;max-width:560px;display:flex;align-items:center;gap:8px;padding:7px 12px;border:1px solid var(--rule);border-radius:var(--radius);background:var(--paper-2);transition:all .12s}
.topbar .search:focus-within{border-color:var(--ink);background:var(--paper);box-shadow:0 0 0 3px oklch(0 0 0/.04)}
.topbar .search input{flex:1;border:none;background:none;outline:none;font-size:13px}
.topbar .search .kbd{font-family:var(--mono);font-size:10px;color:var(--ink-3);border:1px solid var(--rule);padding:1px 5px;border-radius:3px;background:var(--paper)}
.topbar .spacer{flex:1}
.topbar .topbar-actions{display:flex;gap:6px;align-items:center}
.topbar .avatar{width:30px;height:30px;border-radius:50%;background:oklch(0.68 0.08 50);color:white;display:grid;place-items:center;font-size:11px;font-weight:600;letter-spacing:.02em;cursor:pointer;position:relative}
.avatar-menu{position:absolute;top:38px;right:0;background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:6px;width:200px;z-index:100}
.avatar-menu .menu-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);font-size:13px;color:var(--ink-2);cursor:pointer;width:100%;text-align:left;transition:background .1s}
.avatar-menu .menu-item:hover{background:var(--paper-2);color:var(--ink)}
.avatar-menu .menu-item.danger{color:oklch(0.55 0.16 15)}
.avatar-menu hr{border:none;border-top:1px solid var(--rule-soft);margin:4px 0}
.sidebar{grid-area:sidebar;border-right:1px solid var(--rule);background:var(--paper);padding:14px 10px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.sidebar .nav-section{margin-top:16px}
.sidebar .nav-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-3);padding:6px 10px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;color:var(--ink-2);font-size:13px;width:100%;text-align:left;transition:background .1s,color .1s}
.nav-item:hover{background:var(--paper-2);color:var(--ink)}
.nav-item.active{background:var(--ink);color:var(--paper)}
.nav-item.active .count{color:var(--paper);opacity:.7}
.nav-item .count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.nav-item .dot-small{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.4;flex-shrink:0}
.main{grid-area:main;overflow-y:auto;background:var(--paper);position:relative}

/* PAGE HEADER */
.page-header{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;padding:32px 28px 20px;border-bottom:1px solid var(--rule);flex-wrap:wrap;background:linear-gradient(to bottom,var(--paper) 0%,var(--paper) 70%,var(--paper-2) 100%)}
.page-eyebrow{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.page-eyebrow::before{content:"";width:16px;height:1px;background:var(--accent)}
.page-title{font-family:var(--serif);font-size:42px;line-height:1.02;letter-spacing:-0.02em;margin:0;color:var(--ink)}
.page-sub{color:var(--ink-2);font-size:14px;margin-top:8px;max-width:60ch}
.page-meta{font-family:var(--mono);font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;padding:12px 28px;border-bottom:1px solid var(--rule);background:var(--paper);position:sticky;top:0;z-index:5;flex-wrap:wrap}
.filter-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border:1px solid var(--rule);border-radius:100px;font-size:12px;color:var(--ink-2);background:var(--paper);cursor:pointer;transition:all .1s;white-space:nowrap}
.filter-pill:hover{background:var(--paper-2);border-color:var(--ink-4);color:var(--ink)}
.filter-pill.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.toolbar .divider{width:1px;height:22px;background:var(--rule);margin:0 4px}
.toolbar .seg{display:flex;border:1px solid var(--rule);border-radius:var(--radius);overflow:hidden;background:var(--paper)}
.toolbar .seg button{padding:5px 10px;font-size:12px;color:var(--ink-2);border-right:1px solid var(--rule);display:inline-flex;align-items:center;gap:6px;transition:all .1s}
.toolbar .seg button:last-child{border-right:none}
.toolbar .seg button.active{background:var(--ink);color:var(--paper)}
.toolbar .seg button:hover:not(.active){background:var(--paper-2)}
.filter-bar{display:flex;gap:8px;padding:12px 28px;border-bottom:1px solid var(--rule-soft);flex-wrap:wrap;align-items:center;background:var(--paper-2)}
.filter-bar .label-tiny{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-3);margin-right:4px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:var(--rule-soft);padding:1px}
.card{background:var(--paper);padding:16px;cursor:pointer;position:relative;display:flex;flex-direction:column;gap:12px;transition:background .12s ease}
.card:hover{background:var(--paper-2)}
.card-thumbs{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:150px;border-radius:5px;overflow:hidden;background:var(--rule-soft);position:relative}
.card-thumbs .t{position:relative;overflow:hidden;transition:transform .25s ease}
.card-thumbs .t.big{grid-row:1/span 2}
.card-thumbs .t img{width:100%;height:100%;object-fit:cover}
.card-thumbs .t .t-bg{width:100%;height:100%;position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,transparent 0,transparent 8px,oklch(0 0 0/.05) 8px,oklch(0 0 0/.05) 9px)}
.card-thumbs .count-overlay{position:absolute;bottom:6px;right:6px;background:oklch(1 0 0/.94);font-family:var(--mono);font-size:10px;padding:3px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-2);z-index:2}
.card:hover .card-thumbs .t{transform:scale(1.03)}
.card-thumbs .card-preview{position:absolute;inset:0;padding:12px;background:linear-gradient(to bottom,oklch(0 0 0/0) 0%,oklch(0 0 0/.5) 55%,oklch(0 0 0/.82) 100%);opacity:0;transition:opacity .18s;z-index:2;display:flex;flex-direction:column;justify-content:flex-end;color:oklch(1 0 0);pointer-events:none;border-radius:5px}
.card:hover .card-thumbs .card-preview{opacity:1}
.card-preview .title{font-family:var(--serif);font-size:15px;line-height:1.15;margin-bottom:3px;letter-spacing:-0.005em}
.card-preview .meta{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;opacity:.85}
.card-head{display:flex;align-items:flex-start;gap:12px}
.card-avatar-wrap{position:relative;flex-shrink:0}
.card-avatar{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-family:var(--serif);font-size:18px;color:oklch(0.25 0.02 60);letter-spacing:-0.01em;overflow:hidden}
.card-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.card-name{font-family:var(--serif);font-size:20px;line-height:1.05;letter-spacing:-0.015em;color:var(--ink)}
.card-role{font-size:11px;color:var(--ink-3);margin-top:3px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em}
.card-summary{font-size:12.5px;color:var(--ink-2);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:10px;padding:2px 7px;border:1px solid var(--rule);border-radius:3px;color:var(--ink-2);background:var(--paper);letter-spacing:.02em}
.tag.solid{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.card-meta{display:flex;gap:10px;align-items:center;margin-top:auto;font-family:var(--mono);font-size:11px;color:var(--ink-3);padding-top:10px;border-top:1px dashed var(--rule-soft)}
.avail{display:inline-flex;align-items:center;gap:5px}
.avail .d{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 2px color-mix(in oklch,var(--ok) 22%,transparent)}
.avail.passive .d{background:var(--warn);box-shadow:0 0 0 2px color-mix(in oklch,var(--warn) 22%,transparent)}
.avail.closed .d{background:var(--ink-3);box-shadow:none}
.card .star-btn{position:absolute;top:12px;right:12px;width:28px;height:28px;display:grid;place-items:center;border-radius:4px;color:var(--ink-3);background:oklch(1 0 0/.6);backdrop-filter:blur(4px);transition:all .12s;z-index:3}
.card .star-btn:hover{background:var(--paper);color:var(--ink)}
.card .star-btn.active{color:var(--accent);background:var(--accent-soft)}

/* LIST TABLE */
.list-table{width:100%;border-collapse:collapse}
.list-table thead th{text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-3);padding:12px 18px;border-bottom:1px solid var(--rule);background:var(--paper);position:sticky;top:48px;z-index:2}
.list-table tbody tr{border-bottom:1px solid var(--rule-soft);cursor:pointer;transition:background .1s}
.list-table tbody tr:hover{background:var(--paper-2)}
.list-table td{padding:14px 18px;font-size:13px;vertical-align:middle}
.list-table .name-cell{display:flex;align-items:center;gap:12px}
.list-table .name-cell .name{font-family:var(--serif);font-size:19px;letter-spacing:-0.01em;color:var(--ink)}
.list-table .sub{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.stars{display:inline-flex;gap:1px;color:var(--ink-4)}
.stars .s{color:var(--accent)}
.stars.small{font-size:11px}

/* DETAIL */
.detail{display:grid;grid-template-columns:1fr 440px;height:100%}
.detail .left{overflow-y:auto;border-right:1px solid var(--rule)}
.detail .right{overflow-y:auto;background:var(--paper)}
.detail-nav{padding:12px 28px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--paper);z-index:4}
.detail-hero{padding:36px 36px 28px;border-bottom:1px solid var(--rule-soft);display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:start;background:linear-gradient(to bottom right,var(--paper) 0%,var(--paper-2) 100%);position:relative}
.detail-hero .avatar-lg{width:104px;height:104px;border-radius:50%;display:grid;place-items:center;font-family:var(--serif);font-size:44px;color:oklch(0.22 0.02 60);flex-shrink:0;letter-spacing:-0.02em;box-shadow:0 0 0 4px var(--paper),0 0 0 5px var(--rule);overflow:hidden;position:relative;cursor:pointer}
.detail-hero .avatar-lg img{width:100%;height:100%;object-fit:cover}
.avatar-upload-overlay{position:absolute;inset:0;background:oklch(0 0 0/.45);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;opacity:0;transition:opacity .15s;border-radius:50%;cursor:pointer}
.avatar-lg:hover .avatar-upload-overlay{opacity:1}
.avatar-upload-overlay span{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:white}
.detail-hero h1{font-family:var(--serif);font-size:52px;line-height:1.0;letter-spacing:-0.025em;margin:0 0 8px;color:var(--ink)}
.edit-mode .detail-hero h1{display:none}
.detail-hero .role-line{font-family:var(--mono);font-size:11px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.14em;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.detail-hero .role-line .sep{color:var(--ink-4)}
.detail-hero .summary{margin-top:16px;max-width:60ch;color:var(--ink);font-size:16px;line-height:1.55}
.detail-hero .hero-actions{display:flex;gap:8px;margin-top:22px;flex-wrap:wrap}
.key-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--rule-soft);border-bottom:1px solid var(--rule)}
.key-stats .stat{background:var(--paper);padding:16px 20px}
.key-stats .k{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-3);margin-bottom:4px}
.key-stats .v{font-family:var(--serif);font-size:22px;color:var(--ink);letter-spacing:-0.01em}
.key-stats .vsmall{font-size:13px;font-family:var(--sans)}
.section{padding:28px 36px;border-bottom:1px solid var(--rule-soft)}
.section-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--ink-3);margin:0 0 18px;display:flex;align-items:center;justify-content:space-between}
.section-title .link-out{color:var(--ink-3);display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em}
.section-title .link-out:hover{color:var(--accent)}

/* PORTFOLIO GRID */
.portfolio-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px;grid-auto-rows:78px}
.portfolio-piece{border-radius:5px;background:var(--paper-3);position:relative;overflow:hidden;cursor:pointer;display:flex;align-items:flex-end;transition:transform .2s cubic-bezier(.2,.8,.2,1),box-shadow .2s}
.portfolio-piece:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);z-index:2}
.portfolio-piece img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.portfolio-piece::before{content:"";position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,transparent 0,transparent 10px,oklch(0 0 0/.05) 10px,oklch(0 0 0/.05) 11px);transition:opacity .2s;z-index:1}
.portfolio-piece:hover::before{opacity:.5}
.portfolio-piece .piece-label{position:relative;z-index:2;font-family:var(--mono);font-size:10px;padding:7px 10px;background:oklch(1 0 0/.92);backdrop-filter:blur(6px);width:100%;border-top:1px solid var(--rule-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);transition:opacity .2s}
.portfolio-piece:hover .piece-label{opacity:0}
.portfolio-piece .type-badge{position:absolute;top:8px;left:8px;font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.14em;padding:3px 6px;background:oklch(1 0 0/.9);border-radius:3px;z-index:2;color:var(--ink-2)}
.piece-preview{position:absolute;inset:0;padding:14px;background:linear-gradient(to bottom,oklch(0 0 0/0) 0%,oklch(0 0 0/.55) 55%,oklch(0 0 0/.82) 100%);opacity:0;transform:translateY(8px);transition:opacity .2s ease,transform .25s cubic-bezier(.2,.8,.2,1);z-index:3;display:flex;flex-direction:column;justify-content:flex-end;color:oklch(1 0 0);pointer-events:none}
.portfolio-piece:hover .piece-preview{opacity:1;transform:translateY(0)}
.piece-preview .preview-meta{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;opacity:.8;display:flex;gap:8px;margin-bottom:6px}
.piece-preview .preview-title{font-family:var(--serif);font-size:20px;line-height:1.1;letter-spacing:-0.01em;margin-bottom:6px}
.piece-preview .preview-desc{font-size:12px;line-height:1.4;opacity:.9;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.piece-preview .preview-cta{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;margin-top:10px;padding-top:8px;border-top:1px solid oklch(1 0 0/.3);display:inline-flex;align-items:center;gap:6px;opacity:.9}
/* edit mode piece overlay */
.portfolio-piece .piece-edit-btn{position:absolute;top:6px;right:6px;z-index:4;background:oklch(1 0 0/.9);border-radius:4px;padding:4px;display:none;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-2);border:1px solid var(--rule)}
.edit-mode .portfolio-piece .piece-edit-btn{display:flex}
.edit-mode .portfolio-piece{cursor:default}
.edit-mode .portfolio-piece:hover{transform:none;box-shadow:none}
.edit-mode .portfolio-piece:hover .piece-preview{opacity:0}

/* ADD PIECE zone */
.piece-add-zone{border-radius:5px;border:2px dashed var(--rule);background:var(--paper-2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all .15s;grid-column:span 6;grid-row:span 2}
.piece-add-zone:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}

/* experience */
.experience-row{display:grid;grid-template-columns:160px 1fr auto;gap:18px;padding:14px 0;border-bottom:1px dashed var(--rule-soft);align-items:baseline}
.experience-row:last-child{border-bottom:none}
.experience-row .period{font-family:var(--mono);font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.1em}
.experience-row .co{font-weight:500;font-size:15px;color:var(--ink)}
.experience-row .role{color:var(--ink-2);font-size:13px;margin-top:2px}
.experience-row .badge-current{font-family:var(--mono);font-size:9px;color:var(--accent);background:var(--accent-soft);padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.14em}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.meta-grid .cell{padding:16px 22px;border-right:1px solid var(--rule-soft);border-bottom:1px solid var(--rule-soft)}
.meta-grid .cell:nth-child(2n){border-right:none}
.meta-grid .cell:nth-last-child(-n+2){border-bottom:none}
.meta-grid .k{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-3);margin-bottom:5px}
.meta-grid .v{font-size:14px;color:var(--ink)}
.pipeline{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;background:var(--rule-soft);padding:2px;border-radius:var(--radius);overflow:hidden}
.pipeline .stage-cell{background:var(--paper-2);padding:11px 6px;text-align:center;cursor:pointer;font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);transition:all .12s}
.pipeline .stage-cell:hover{background:var(--paper-3);color:var(--ink-2)}
.pipeline .stage-cell.active{background:var(--accent);color:white;font-weight:500}
.pipeline .stage-cell.past{background:var(--ink);color:var(--paper);opacity:.85}
.note{padding:14px 0;border-bottom:1px dashed var(--rule-soft)}
.note:last-child{border-bottom:none}
.note .meta{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-bottom:6px;display:flex;justify-content:space-between;letter-spacing:.08em}
.note .text{font-size:13.5px;line-height:1.55;color:var(--ink)}
.note-input{width:100%;border:1px solid var(--rule);border-radius:var(--radius);padding:11px;background:var(--paper-2);resize:vertical;min-height:68px;font-size:13px;transition:all .12s}
.note-input:focus{outline:none;border-color:var(--ink);background:var(--paper);box-shadow:0 0 0 3px oklch(0 0 0/.04)}

/* EDIT MODE */
.edit-banner{background:oklch(0.56 0.16 35);color:white;padding:10px 28px;display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;position:sticky;top:0;z-index:10}
.edit-banner .spacer{flex:1}
.edit-field{width:100%;border:1px dashed var(--rule);border-radius:4px;padding:6px 9px;background:oklch(1 0 0/.6);font-size:inherit;color:inherit;outline:none;transition:all .12s;font-family:inherit}
.edit-field:focus{border-color:var(--accent);background:white;box-shadow:0 0 0 2px var(--accent-soft)}
.edit-field.lg{font-family:var(--serif);font-size:52px;line-height:1;letter-spacing:-0.025em;padding:4px 8px}
.edit-field.summary{font-size:16px;line-height:1.55;min-height:80px;resize:vertical}
.edit-row-actions{display:flex;gap:4px;align-items:center;margin-top:4px}
.edit-section-add{display:flex;align-items:center;gap:6px;padding:10px 0;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--accent);cursor:pointer;border:none;background:none;transition:opacity .1s}
.edit-section-add:hover{opacity:.7}
.inline-edit-group{display:flex;flex-direction:column;gap:6px;padding:12px;background:var(--paper-2);border-radius:var(--radius);border:1px solid var(--rule);margin-bottom:8px}
.inline-edit-group .irow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.inline-edit-group .irow.triple{grid-template-columns:1fr 1fr 1fr}
.inline-edit-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-3);margin-bottom:3px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:var(--radius);border:1px solid var(--rule);background:var(--paper);font-size:13px;color:var(--ink);cursor:pointer;transition:all .12s ease;font-weight:500;white-space:nowrap}
.btn:hover{background:var(--paper-2);border-color:var(--ink-4)}
.btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink);box-shadow:0 1px 2px oklch(0 0 0/.08)}
.btn.primary:hover{background:oklch(0.1 0.012 60)}
.btn.accent{background:var(--accent);color:white;border-color:var(--accent);box-shadow:0 1px 2px oklch(0 0 0/.1)}
.btn.accent:hover{background:var(--accent-2)}
.btn.ghost{border-color:transparent}
.btn.ghost:hover{background:var(--paper-2)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.lg{padding:10px 18px;font-size:14px}
.btn.icon{padding:6px;width:32px;height:32px;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.full{width:100%;justify-content:center}
.btn.danger{color:oklch(0.55 0.16 15);border-color:oklch(0.85 0.08 15)}
.btn.danger:hover{background:oklch(0.97 0.02 15)}

/* LISTS */
.lists-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--rule-soft);padding:1px}
.list-card{background:var(--paper);padding:22px;cursor:pointer;display:flex;flex-direction:column;gap:16px;min-height:200px;transition:background .12s}
.list-card:hover{background:var(--paper-2)}
.list-card .name{font-family:var(--serif);font-size:24px;letter-spacing:-0.015em;color:var(--ink);line-height:1.1}
.list-card .mini-thumbs{display:flex;margin-top:auto}
.list-card .mini-thumbs .m{width:38px;height:38px;border-radius:50%;border:2.5px solid var(--paper);display:grid;place-items:center;font-family:var(--serif);font-size:15px;color:oklch(0.22 0.02 60);margin-left:-10px;box-shadow:0 1px 2px oklch(0 0 0/.04);overflow:hidden}
.list-card .mini-thumbs .m:first-child{margin-left:0}
.list-card .meta-row{font-family:var(--mono);font-size:11px;color:var(--ink-3);display:flex;justify-content:space-between;letter-spacing:.06em}

/* MODAL */
.modal{position:fixed;inset:0;background:oklch(0.1 0.01 60/.65);display:grid;place-items:center;z-index:100;padding:32px;backdrop-filter:blur(6px);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-inner{background:var(--paper);border-radius:10px;max-width:1100px;width:100%;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:slideUp .2s cubic-bezier(.2,.8,.2,1)}
@keyframes slideUp{from{transform:translateY(8px);opacity:.9}to{transform:translateY(0);opacity:1}}
.modal-inner.sm{max-width:520px}
.modal-inner.md{max-width:680px}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 24px;border-bottom:1px solid var(--rule);gap:16px}
.modal-body{flex:1;overflow:auto;padding:28px}
.modal-img{aspect-ratio:16/10;background:var(--paper-3);border-radius:6px;position:relative;overflow:hidden;width:100%}
.modal-img img{width:100%;height:100%;object-fit:cover}
.modal-img::before{content:"";position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,transparent 0,transparent 14px,oklch(0 0 0/.05) 14px,oklch(0 0 0/.05) 15px);z-index:1}
.modal-meta-row{display:flex;gap:32px;margin-top:20px;flex-wrap:wrap}
.modal-meta-row .m-item .k{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-3);margin-bottom:3px}
.modal-meta-row .m-item .v{font-size:14px;color:var(--ink)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 24px;border-top:1px solid var(--rule)}

/* ADD CANDIDATE */
.add-form-section{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--rule-soft)}
.add-form-section:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.add-form-section-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--ink-3);margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row.triple{grid-template-columns:1fr 1fr 1fr}
.parse-result{background:var(--paper-2);border:1px solid var(--ok);border-radius:var(--radius-lg);padding:16px;margin-top:14px}
.parse-result .parse-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--ok);margin-bottom:8px}
.parse-result .parse-preview{display:flex;flex-direction:column;gap:6px}
.parse-result .parse-field{display:flex;gap:10px;font-size:12px}
.parse-result .parse-field .fk{color:var(--ink-3);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;width:80px;flex-shrink:0;margin-top:2px}
.parse-result .parse-field .fv{color:var(--ink)}
.parse-spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--rule);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.url-input-row{display:flex;gap:8px;align-items:flex-end}
.url-input-row .form-input{flex:1}

/* IMAGE UPLOAD */
.upload-zone{border:2px dashed var(--rule);border-radius:var(--radius-lg);padding:28px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-soft)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-zone .uz-icon{color:var(--ink-3);margin-bottom:10px}
.upload-zone .uz-label{font-size:13px;color:var(--ink-2);margin-bottom:4px}
.upload-zone .uz-hint{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-4)}

/* DISCIPLINES */
.discipline-list{display:flex;flex-direction:column;gap:2px;margin-bottom:16px}
.discipline-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--rule);border-radius:var(--radius);background:var(--paper);font-size:13px}
.discipline-item .dname{flex:1;font-size:13px;color:var(--ink)}
.discipline-item .dcnt{font-family:var(--mono);font-size:11px;color:var(--ink-3)}

/* EMPTY */
.empty{padding:80px 24px;text-align:center;color:var(--ink-3);font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase}
.menu-btn{display:none}

/* TWEAKS */
.tweaks-panel{position:fixed;bottom:20px;right:20px;width:320px;background:var(--paper);border:1px solid var(--rule);border-radius:10px;box-shadow:var(--shadow-md);padding:18px;z-index:50;display:none}
.tweaks-panel.open{display:block}
.tweaks-panel h3{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.14em;margin:0 0 14px;color:var(--ink-3)}
.tweaks-panel .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px}
.tweaks-panel .row label{font-size:12px;color:var(--ink-2)}
.tweaks-panel .swatches{display:flex;gap:6px}
.tweaks-panel .swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .1s}
.tweaks-panel .swatch:hover{transform:scale(1.1)}
.tweaks-panel .swatch.active{border-color:var(--ink)}
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:100px;font-size:13px;font-weight:500;box-shadow:var(--shadow-md);animation:toastIn .2s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.icon{width:16px;height:16px;stroke-width:1.6;flex-shrink:0}
.icon-sm{width:13px;height:13px;stroke-width:1.7}
.icon-lg{width:20px;height:20px;stroke-width:1.5}

/* RESPONSIVE */
@media(max-width:1024px){.home-body{grid-template-columns:1fr}.hero-section{display:none}.login-panel{padding:48px 32px;min-height:calc(100vh - 64px)}}
@media(max-width:960px){.app{grid-template-columns:1fr;grid-template-areas:"topbar" "main"}.sidebar{position:fixed;top:52px;left:0;bottom:0;width:260px;z-index:30;transform:translateX(-100%);transition:transform .22s ease;box-shadow:var(--shadow-md)}.sidebar.open{transform:translateX(0)}.menu-btn{display:inline-flex}.detail{grid-template-columns:1fr;display:block;height:auto}.detail .left,.detail .right{overflow:visible;height:auto}.detail .left{border-right:none}.detail .right{border-top:1px solid var(--rule)}.detail-nav{position:static}.detail-hero{grid-template-columns:1fr;padding:24px;gap:16px}.detail-hero h1{font-size:36px}.page-header{padding:20px}.page-title{font-size:30px}.toolbar{padding:10px 20px}.filter-bar{padding:10px 20px}.section{padding:22px 24px}.key-stats{grid-template-columns:repeat(2,1fr)}.form-row{grid-template-columns:1fr}.form-row.triple{grid-template-columns:1fr}}
@media(max-width:600px){.grid{grid-template-columns:1fr}.topbar .search{display:none}.topbar .brand .mono{display:none}.portfolio-grid{grid-template-columns:repeat(6,1fr);grid-auto-rows:92px}.meta-grid{grid-template-columns:1fr}.meta-grid .cell{border-right:none !important}.pipeline{grid-template-columns:repeat(3,1fr)}.experience-row{grid-template-columns:1fr;gap:2px}.experience-row .period{margin-bottom:4px}.detail-hero .avatar-lg{width:80px;height:80px;font-size:34px}.detail-hero h1{font-size:30px}}
.main::-webkit-scrollbar,.sidebar::-webkit-scrollbar,.detail .left::-webkit-scrollbar,.detail .right::-webkit-scrollbar{width:10px}
.main::-webkit-scrollbar-thumb,.sidebar::-webkit-scrollbar-thumb,.detail .left::-webkit-scrollbar-thumb,.detail .right::-webkit-scrollbar-thumb{background:var(--rule);border-radius:5px;border:2px solid var(--paper)}
</style>

const load = (key, fallback) => { try { const s=localStorage.getItem(key); return s?JSON.parse(s):fallback; } catch { return fallback; } };

/* ── PLATFORM DETECTION ── */
const detectPlatform = (url) => {
  const u = url.toLowerCase();
  if(u.includes("behance.net")) return "behance";
  if(u.includes("dribbble.com")) return "dribbble";
  if(u.includes("linkedin.com")) return "linkedin";
  if(u.includes("artstation.com")) return "artstation";
  if(u.includes("cargo.site")||u.includes("cargocollective")) return "cargo";
  if(u.includes("squarespace.com")||u.includes("format.com")||u.includes("portfoliobox")) return "portfolio_builder";
  if(u.includes("github.com")) return "github";
  if(u.includes("read.cv")||u.includes("readcv")) return "readcv";
  if(u.includes("contra.com")) return "contra";
  return "personal";
};

/* ── CORS PROXY FETCH ── */
const fetchPageContent = async (url) => {
  // Try allorigins first (free CORS proxy)
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  try {
    const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
    const d = await r.json();
    return d.contents || "";
  } catch {
    return "";
  }
};

/* ── EXTRACT IMAGES FROM HTML ── */
const extractImagesFromHTML = (html, baseUrl, platform) => {
  if(!html) return [];
  const imgs = [];
  const seen = new Set();

  // Parse URL for base domain
  let base = "";
  try { base = new URL(baseUrl).origin; } catch {}

  // Helper: resolve relative URLs
  const resolve = (src) => {
    if(!src) return null;
    if(src.startsWith("data:")) return null;
    if(src.startsWith("http")) return src;
    if(src.startsWith("//")) return "https:" + src;
    if(src.startsWith("/")) return base + src;
    return null;
  };

  // Extract og:image / twitter:image (most reliable)
  const ogMatch = html.match(/<meta[^>]+(?:property=["']og:image["']|name=["']twitter:image["'])[^>]+content=["']([^"']+)["']/gi) || [];
  ogMatch.forEach(m => {
    const cm = m.match(/content=["']([^"']+)["']/);
    if(cm && cm[1]) { const u=resolve(cm[1]); if(u&&!seen.has(u)){seen.add(u);imgs.push({url:u,type:"og",score:10});} }
  });

  // Platform-specific selectors
  if(platform==="behance") {
    // Behance project image URLs pattern
    const re = /["']https:\/\/mir-s3-cdn-cf\.behance\.net\/projects\/[^"']+["']/g;
    const matches = html.match(re)||[];
    matches.slice(0,12).forEach(m => {
      const u=m.replace(/["']/g,"");
      if(!seen.has(u)){seen.add(u);imgs.push({url:u,type:"work",score:8});}
    });
    // Also check max-1200 pattern
    const re2 = /["'](https:\/\/mir-s3-cdn-cf\.behance\.net\/[^"']+\.(jpg|jpeg|png|webp))["']/gi;
    const m2=html.match(re2)||[];
    m2.slice(0,10).forEach(m => { const u=m.replace(/["']/g,""); if(!seen.has(u)){seen.add(u);imgs.push({url:u,type:"work",score:7});} });
  }

  if(platform==="dribbble") {
    const re = /["'](https:\/\/cdn\.dribbble\.com\/[^"']+\.(png|jpg|jpeg|gif|webp))["']/gi;
    const matches=html.match(re)||[];
    matches.slice(0,12).forEach(m=>{ const u=m.replace(/["']/g,""); if(!seen.has(u)){seen.add(u);imgs.push({url:u,type:"work",score:8});} });
  }

  if(platform==="artstation") {
    const re = /["'](https:\/\/cdna?\.artstation\.com\/[^"']+\.(jpg|jpeg|png|webp))["']/gi;
    const matches=html.match(re)||[];
    matches.slice(0,12).forEach(m=>{ const u=m.replace(/["']/g,""); if(!seen.has(u)){seen.add(u);imgs.push({url:u,type:"work",score:8});} });
  }

  // Generic img src extraction (fallback)
  const imgRe = /<img[^>]+src=["']([^"']+\.(jpg|jpeg|png|webp|gif))["']/gi;
  let imgMatch;
  while((imgMatch=imgRe.exec(html))!==null){
    const u=resolve(imgMatch[1]);
    if(u&&!seen.has(u)){
      seen.add(u);
      // Score based on size hints in src
      const score = (u.includes("large")||u.includes("original")||u.includes("max")||u.includes("full")||u.includes("1200")||u.includes("800"))?5:2;
      imgs.push({url:u,type:"img",score});
    }
    if(imgs.length>40) break;
  }

  // Sort by score, filter obvious non-work images (avatars, icons, logos)
  return imgs
    .filter(i=>{
      const u=i.url.toLowerCase();
      return !u.includes("avatar")&&!u.includes("icon")&&!u.includes("logo")&&!u.includes("sprite")&&!u.includes("pixel")&&!u.includes("badge")&&u.length>20;
    })
    .sort((a,b)=>b.score-a.score)
    .slice(0,12)
    .map(i=>i.url);
};

const parseURLWithClaude = async (url, onProgress) => {

  // Step 1: Try to fetch real page content

  } catch(e) {

  let htmlSnippet = "";

    // Extract title
    const titleM = pageHTML.match(/<title[^>]*>([^<]+)<\/title>/i);
    const title = titleM ? titleM[1] : "";
    // Extract all meta content
    const metas = (pageHTML.match(/<meta[^>]+>/gi)||[]).slice(0,30).join("\n");
    // Extract text content (strip tags, take first 3000 chars)
    const textContent = pageHTML
      .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,"")
      .replace(/<style[^>]*>[\s\S]*?<\/style>/gi,"")
      .replace(/<[^>]+>/g," ")
      .replace(/\s+/g," ")
      .trim()
      .slice(0,3000);
    htmlSnippet = `TITLE: ${title}\n\nMETA TAGS:\n${metas}\n\nPAGE TEXT:\n${textContent}`;
  }

  const userPrompt = `Analyze this creative professional's online presence and extract structured data for a talent ATS.

URL: ${url}
PLATFORM DETECTED: ${platform}
${htmlSnippet ? `\nPAGE CONTENT (scraped):\n${htmlSnippet}\n` : ""}
${pageImages.length>0 ? `\nIMAGES FOUND ON PAGE (${pageImages.length} total, use these as portfolio piece images):\n${pageImages.slice(0,8).map((u,i)=>`${i+1}. ${u}`).join("\n")}\n` : ""}

Based on ALL available information above, return a JSON object. Use web search if needed to look up this person.

  const apiBody = {
    model: "claude-sonnet-4-20250514",
    max_tokens: 2000,
    system: systemPrompt,
    tools: [{
      type: "web_search_20250305",

    }],
    messages: [{ role: "user", content: userPrompt }]
  };

  let response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",

  });

  let data = await response.json();
  onProgress && onProgress("Processing results…", 85);

  // Handle multi-turn if Claude used web_search tool
  if(data.stop_reason === "tool_use") {
    const toolUseBlocks = data.content.filter(b => b.type === "tool_use");
    const toolResults = toolUseBlocks.map(b => ({
      type: "tool_result",

      content: `[Web search performed for: ${b.input?.query||url}. Use the URL and page content provided to infer candidate details.]`
    }));

    // Continue conversation with tool results
    const continueBody = {
      model: "claude-sonnet-4-20250514",
      max_tokens: 2000,
      system: systemPrompt,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [
        { role: "user", content: userPrompt },
        { role: "assistant", content: data.content },

    parsed.portfolio = parsed.portfolio.map((p, i) => ({
      ...p,
      image: p.image || pageImages[i+1] || pageImages[i] || null
    }));
  }

  return { ...parsed, _pageImages: pageImages };
};

const toDataURL = file => new Promise((res,rej)=>{

  r.readAsDataURL(file);
});

const CandidateDetail = ({ c, candidates, disciplines, onBack, onToggleStar, onSetStage, onAddNote, onNavigate, onUpdate, showToast }) => {
  const [noteDraft, setNoteDraft] = useState("");
  const [activePiece, setActivePiece] = useState(null);
  const [editMode, setEditMode] = useState(false);
  const [draft, setDraft] = useState(null);
  const [editingPiece, setEditingPiece] = useState(null); // {piece, index} or {piece:null, isNew:true}
  const [modal, setModal] = useState(null);
  const idx = candidates.findIndex(x=>x.id===c.id);
  const prev = candidates[(idx-1+candidates.length)%candidates.length];
  const next = candidates[(idx+1)%candidates.length];
  const stageIdx = STAGES.indexOf(c.stage);

  const startEdit = () => {
    setDraft(JSON.parse(JSON.stringify(c))); // deep clone
    setEditMode(true);
  };
  const cancelEdit = () => { setDraft(null); setEditMode(false); };
  const saveEdit = () => { onUpdate(draft); setEditMode(false); setDraft(null); showToast("Profile saved ✓"); };

  const sd = (k,v) => setDraft(d=>({...d,[k]:v})); // set draft field
  const cur = editMode ? draft : c;

  const handleAvatarUpload = async (file) => {
    if(!file||!file.type.startsWith("image/")) return;
    const url = await toDataURL(file);
    if(editMode) sd("photo",url);
  };

  const handlePieceKey = (dir) => {
    const pidx = c.portfolio.indexOf(activePiece);
    setActivePiece(c.portfolio[(pidx+dir+c.portfolio.length)%c.portfolio.length]);
  };

  const savePiece = (piece, index) => {
    const pieces = [...(draft.portfolio||[])];
    if(index===-1) pieces.push(piece);
    else pieces[index] = piece;
    sd("portfolio",pieces);
  };
  const deletePiece = (index) => {
    const pieces = [...(draft.portfolio||[])];
    pieces.splice(index,1);
    sd("portfolio",pieces);
  };

  const addExp = () => sd("experience",[...(draft.experience||[]),{co:"",role:"",period:""}]);
  const updateExp = (i,k,v) => { const a=[...(draft.experience||[])]; a[i]={...a[i],[k]:v}; sd("experience",a); };
  const removeExp = (i) => { const a=[...(draft.experience||[])]; a.splice(i,1); sd("experience",a); };

  const addEdu = () => sd("education",[...(draft.education||[]),{school:"",degree:"",year:""}]);
  const updateEdu = (i,k,v) => { const a=[...(draft.education||[])]; a[i]={...a[i],[k]:v}; sd("education",a); };
  const removeEdu = (i) => { const a=[...(draft.education||[])]; a.splice(i,1); sd("education",a); };

  return (
    <div className={`detail${editMode?" edit-mode":""}`}>
      <div className="left">
        {/* edit banner */}
        {editMode && (
          <div className="edit-banner">
            <Icon name="edit" className="icon-sm"/>
            <span>Editing profile</span>
            <div className="spacer"/>
            <button className="btn sm" style={{color:"white",borderColor:"oklch(1 0 0/.3)"}} onClick={cancelEdit}>Cancel</button>
            <button className="btn sm" style={{background:"white",color:"var(--accent)",borderColor:"white"}} onClick={saveEdit}><Icon name="check" className="icon-sm"/>Save changes</button>
          </div>
        )}

        <div className="detail-nav">
          <button className="btn sm" onClick={onBack}><Icon name="arrowLeft" className="icon-sm"/>Roster</button>
          <div style={{flex:1}}/>
          <span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--ink-3)",letterSpacing:"0.08em"}}>{String(idx+1).padStart(2,"0")} / {String(candidates.length).padStart(2,"0")}</span>
          <button className="btn icon" onClick={()=>onNavigate(prev.id)} title="Previous (K)"><Icon name="arrowLeft" className="icon-sm"/></button>
          <button className="btn icon" onClick={()=>onNavigate(next.id)} title="Next (J)"><Icon name="arrowRight" className="icon-sm"/></button>
          {!editMode && <button className="btn sm" onClick={startEdit}><Icon name="edit" className="icon-sm"/>Edit profile</button>}
        </div>

        <div className="detail-hero">
          {/* avatar */}
          <label style={{cursor:"pointer"}}>
            <div className="avatar-lg" style={{background:`color-mix(in oklch,${cur.color} 45%,var(--paper-2))`}}>
              {cur.photo ? <img src={cur.photo} alt={cur.name}/> : Initials(cur.name)}
              {editMode && (
                <div className="avatar-upload-overlay">
                  <Icon name="upload" className="icon-sm" style={{color:"white"}}/>
                  <span>Change photo</span>
                </div>
              )}
            </div>
            {editMode && <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleAvatarUpload(e.target.files[0])}/>}
          </label>

          <div>
            <div className="page-eyebrow" style={{marginBottom:8}}>
              {editMode ? (
                <select className="form-input" value={draft.discipline} onChange={e=>sd("discipline",e.target.value)} style={{cursor:"pointer",maxWidth:220,padding:"4px 8px",fontSize:11}}>
                  {disciplines.map(d=><option key={d}>{d}</option>)}
                </select>
              ) : `${cur.discipline} · ${cur.availability==="open"?"Open to work":cur.availability==="passive"?"Passive":"Not looking"}`}
            </div>

            {editMode ? (
              <input className="edit-field lg" value={draft.name} onChange={e=>sd("name",e.target.value)} style={{width:"100%",marginBottom:8}}/>
            ) : (
              <h1>{cur.name}</h1>
            )}

            <div className="role-line">
              {editMode ? (
                <>
                  <input className="edit-field" value={draft.yrs} onChange={e=>sd("yrs",parseInt(e.target.value)||0)} style={{width:50}} type="number" min="0" max="40"/>
                  <span className="sep">yrs ·</span>
                  <input className="edit-field" value={draft.location} onChange={e=>sd("location",e.target.value)} style={{width:140}} placeholder="City, Country"/>
                  <span className="sep">·</span>
                  <input className="edit-field" value={draft.timezone} onChange={e=>sd("timezone",e.target.value)} style={{width:60}} placeholder="TZ"/>
                </>
              ) : (
                <>
                  <span>{cur.yrs} YRS</span><span className="sep">·</span><span>{cur.location}</span><span className="sep">·</span><span>{cur.timezone}</span><span className="sep">·</span><Stars n={cur.stars} small/>
                </>
              )}
            </div>

            {editMode ? (
              <textarea className="edit-field summary" style={{marginTop:16,width:"100%"}} value={draft.summary} onChange={e=>sd("summary",e.target.value)}/>
            ) : (
              <div className="summary">{cur.summary}</div>
            )}

            {!editMode && (
              <div className="hero-actions">
                <button className="btn accent lg" onClick={()=>setModal("reach")}><Icon name="mail" className="icon-sm"/>Reach out</button>
                <button className="btn lg" onClick={()=>setModal("schedule")}><Icon name="calendar" className="icon-sm"/>Schedule</button>
                <button className="btn lg" onClick={()=>onToggleStar(c.id)}>
                  <Icon name={c.shortlist?"starFill":"star"} className="icon-sm" style={c.shortlist?{color:"var(--accent)"}:{}}/>
                  {c.shortlist?"Shortlisted":"Shortlist"}
                </button>
                <button className="btn lg ghost" onClick={()=>setModal("share")}><Icon name="share" className="icon-sm"/>Share</button>
              </div>
            )}
            {editMode && (
              <div className="hero-actions" style={{marginTop:16}}>
                <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--ink-3)",textTransform:"uppercase",letterSpacing:"0.12em",display:"flex",alignItems:"center",gap:8}}>
                  <Icon name="eye" className="icon-sm"/>Photo and name are now editable above
                </div>
              </div>
            )}
          </div>
        </div>

        {/* key stats */}
        <div className="key-stats">
          {editMode ? (
            <>
              {[["Comp expected","salary"],["Contract rate","rate"]].map(([label,key])=>(
                <div key={key} className="stat">
                  <div className="k">{label}</div>
                  <input className="edit-field" value={draft[key]} onChange={e=>sd(key,e.target.value)} style={{fontSize:18,fontFamily:"var(--serif)"}}/>
                </div>
              ))}
              <div className="stat"><div className="k">Portfolio</div><div className="v">{(draft.portfolio||[]).length} pieces</div></div>
              <div className="stat">
                <div className="k">Pronouns</div>
                <input className="edit-field" value={draft.pronouns} onChange={e=>sd("pronouns",e.target.value)} style={{fontSize:14}}/>
              </div>
            </>
          ) : (
            <>
              <div className="stat"><div className="k">Comp expected</div><div className="v">{cur.salary}</div></div>
              <div className="stat"><div className="k">Contract rate</div><div className="v">{cur.rate}</div></div>
              <div className="stat"><div className="k">Portfolio</div><div className="v">{cur.portfolio.length} pieces</div></div>
              <div className="stat"><div className="k">Last active</div><div className="v vsmall" style={{paddingTop:4}}>{cur.lastActive}{cur.lastActive!=="just now"?" ago":""}</div></div>
            </>
          )}
        </div>

        {/* portfolio */}
        <div className="section">
          <div className="section-title">
            <span>Portfolio · {cur.portfolio.length} pieces</span>
            {cur.links?.portfolio && !editMode && (
              <a className="link-out" href={`https://${cur.links.portfolio}`} target="_blank" rel="noopener">
                <Icon name="arrowUpRight" className="icon-sm" style={{width:11,height:11}}/>{cur.links.portfolio}
              </a>
            )}
          </div>
          {cur.portfolio.length>0 ? (
            <div className="portfolio-grid">
              {cur.portfolio.map((p,i)=>(
                <div key={i} className="portfolio-piece"
                  style={{gridColumn:`span ${p.w}`,gridRow:`span ${Math.max(1,p.h-1)}`,background:`color-mix(in oklch,${cur.color} ${32+(i*9)%32}%,var(--paper-3))`}}
                  onClick={()=>!editMode&&setActivePiece(p)}>
                  {p.image && <img src={p.image} alt={p.label}/>}
                  <span className="type-badge">{p.type}</span>
                  <span className="piece-label">{p.label}</span>
                  {!editMode && (
                    <div className="piece-preview">
                      <div className="preview-meta"><span>{p.client}</span><span>·</span><span>{p.year}</span></div>
                      <div className="preview-title">{p.label}</div>
                      <div className="preview-desc">{p.desc}</div>
                      <div className="preview-cta">View piece <Icon name="arrowUpRight" className="icon-sm" style={{width:11,height:11}}/></div>
                    </div>
                  )}
                  {editMode && (
                    <button className="piece-edit-btn" onClick={e=>{e.stopPropagation();setEditingPiece({piece:p,index:i})}}>
                      <Icon name="edit" className="icon-sm"/>Edit
                    </button>
                  )}
                </div>
              ))}
              {editMode && (
                <div className="piece-add-zone" onClick={()=>setEditingPiece({piece:null,isNew:true})}>
                  <Icon name="plus" className="icon-lg"/>
                  <span style={{fontFamily:"var(--mono)",fontSize:10,textTransform:"uppercase",letterSpacing:"0.12em"}}>Add piece</span>
                </div>
              )}
            </div>
          ) : (
            <div style={{textAlign:"center",padding:"32px 0",color:"var(--ink-3)"}}>
              {editMode ? (
                <button className="btn accent" onClick={()=>setEditingPiece({piece:null,isNew:true})}><Icon name="plus" className="icon-sm"/>Add first piece</button>
              ) : (
                <div style={{fontFamily:"var(--mono)",fontSize:11,textTransform:"uppercase",letterSpacing:"0.1em"}}>No portfolio pieces yet</div>
              )}
            </div>
          )}
          {editMode && cur.portfolio.length>0 && (
            <button className="edit-section-add" onClick={()=>setEditingPiece({piece:null,isNew:true})} style={{marginTop:16}}>
              <Icon name="plus" className="icon-sm"/>Add portfolio piece
            </button>
          )}
        </div>

        {/* experience */}
        <div className="section">
          <div className="section-title"><span>Experience</span></div>
          {(cur.experience||[]).map((e,i)=>(
            editMode ? (
              <div key={i} className="inline-edit-group">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--ink-3)",textTransform:"uppercase",letterSpacing:"0.1em"}}>Role {i+1}</div>
                  <button className="btn icon sm" onClick={()=>removeExp(i)} style={{width:24,height:24,color:"var(--ink-3)"}}><Icon name="trash" className="icon-sm"/></button>
                </div>
                <div className="irow">
                  <div><div className="inline-edit-label">Company</div><input className="form-input" value={e.co} onChange={ev=>updateExp(i,"co",ev.target.value)} placeholder="Company name" style={{fontSize:13}}/></div>
                  <div><div className="inline-edit-label">Role</div><input className="form-input" value={e.role} onChange={ev=>updateExp(i,"role",ev.target.value)} placeholder="Job title" style={{fontSize:13}}/></div>
                </div>
                <div><div className="inline-edit-label">Period</div><input className="form-input" value={e.period} onChange={ev=>updateExp(i,"period",ev.target.value)} placeholder="2022 — Present" style={{fontSize:13,marginTop:0}}/></div>
              </div>
            ) : (
              <div className="experience-row" key={i}>
                <span className="period">{e.period}</span>
                <div><div className="co">{e.co}</div><div className="role">{e.role}</div></div>
                <span>{i===0?<span className="badge-current">Current</span>:null}</span>
              </div>
            )
          ))}
          {editMode && <button className="edit-section-add" onClick={addExp}><Icon name="plus" className="icon-sm"/>Add experience</button>}
          {!editMode && (cur.experience||[]).length===0 && <div style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--ink-3)",textTransform:"uppercase",letterSpacing:"0.1em"}}>No experience listed</div>}
        </div>

        {/* education */}
        <div className="section">
          <div className="section-title"><span>Education</span></div>
          {(cur.education||[]).map((e,i)=>(
            editMode ? (
              <div key={i} className="inline-edit-group">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--ink-3)",textTransform:"uppercase",letterSpacing:"0.1em"}}>School {i+1}</div>
                  <button className="btn icon sm" onClick={()=>removeEdu(i)} style={{width:24,height:24,color:"var(--ink-3)"}}><Icon name="trash" className="icon-sm"/></button>
                </div>
                <div className="irow">
                  <div><div className="inline-edit-label">School</div><input className="form-input" value={e.school} onChange={ev=>updateEdu(i,"school",ev.target.value)} placeholder="School name" style={{fontSize:13}}/></div>
                  <div><div className="inline-edit-label">Degree</div><input className="form-input" value={e.degree} onChange={ev=>updateEdu(i,"degree",ev.target.value)} placeholder="BFA Graphic Design" style={{fontSize:13}}/></div>
                </div>
                <div><div className="inline-edit-label">Year</div><input className="form-input" value={e.year} onChange={ev=>updateEdu(i,"year",ev.target.value)} placeholder="2020" style={{fontSize:13,maxWidth:100,marginTop:0}}/></div>
              </div>
            ) : (
              <div className="experience-row" key={i}>
                <span className="period">{e.year}</span>
                <div><div className="co">{e.school}</div><div className="role">{e.degree}</div></div>
                <span/>
              </div>
            )
          ))}
          {editMode && <button className="edit-section-add" onClick={addEdu}><Icon name="plus" className="icon-sm"/>Add education</button>}
        </div>

        {/* tools & tags */}
        <div className="section">
          <div className="section-title"><span>Tools & Tags</span></div>
          {editMode ? (
            <>
              <div className="form-group"><label className="form-label">Tools (comma-separated)</label><input className="form-input" value={(draft.tools||[]).join(", ")} onChange={e=>sd("tools",e.target.value.split(",").map(t=>t.trim()).filter(Boolean))}/></div>
              <div className="form-group"><label className="form-label">Tags (comma-separated)</label><input className="form-input" value={(draft.tags||[]).join(", ")} onChange={e=>sd("tags",e.target.value.split(",").map(t=>t.trim()).filter(Boolean))}/></div>
            </>
          ) : (
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {(cur.tools||[]).map(t=><span key={t} className="tag solid">{t}</span>)}
              {(cur.tags||[]).map(t=><span key={t} className="tag">{t}</span>)}
            </div>
          )}
        </div>

        {/* links (edit) */}
        {editMode && (
          <div className="section">
            <div className="section-title"><span>Links</span></div>
            {Object.entries(draft.links||{}).map(([k,v])=>(
              <div key={k} className="form-group">
                <label className="form-label">{k}</label>
                <div style={{display:"flex",gap:8}}>
                  <input className="form-input" value={v} onChange={e=>sd("links",{...draft.links,[k]:e.target.value})}/>
                  <button className="btn icon sm danger" onClick={()=>{ const lnk={...draft.links}; delete lnk[k]; sd("links",lnk); }}><Icon name="x" className="icon-sm"/></button>
                </div>
              </div>
            ))}
            <button className="edit-section-add" onClick={()=>{
              const key=prompt("Link type (e.g. portfolio, github, twitter):");
              if(key&&key.trim()) sd("links",{...(draft.links||{}),[key.trim()]:""});
            }}><Icon name="plus" className="icon-sm"/>Add link</button>
          </div>
        )}
      </div>

      {/* RIGHT PANEL */}
      <div className="right">
        <div className="section" style={{paddingTop:24}}>
          <div className="section-title"><span>Pipeline stage</span></div>
          <div className="pipeline">
            {STAGES.map((s,i)=>(
              <button key={s} className={"stage-cell"+(s===c.stage?" active":(i<stageIdx?" past":""))} onClick={()=>{ onSetStage(c.id,s); showToast(`Moved to ${s}`); }}>{s}</button>
            ))}
          </div>
        </div>

        <div className="meta-grid">
          <div className="cell"><div className="k">Rating</div><div className="v"><Stars n={c.stars} onClick={(n)=>onUpdate({...c,stars:n})}/></div></div>
          <div className="cell"><div className="k">Availability</div><div className="v" style={{fontSize:12}}><Availability state={c.availability}/></div></div>
          <div className="cell"><div className="k">Pronouns</div><div className="v">{c.pronouns||"—"}</div></div>
          <div className="cell"><div className="k">Timezone</div><div className="v">{c.timezone}</div></div>
        </div>

        <div className="section">
          <div className="section-title">
            <span>Notes · {(c.notes||[]).length}</span>
            <span style={{color:"var(--ink-3)",fontFamily:"var(--mono)",fontSize:10}}>PRIVATE</span>
          </div>
          <textarea className="note-input" placeholder="Add a note — impressions, questions, follow-ups..." value={noteDraft} onChange={e=>setNoteDraft(e.target.value)}/>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:10,marginBottom:14}}>
            <button className="btn primary sm" disabled={!noteDraft.trim()} onClick={()=>{ onAddNote(c.id,noteDraft); setNoteDraft(""); showToast("Note saved"); }}>Save note</button>
          </div>
          {(c.notes||[]).length===0 ? (
            <div style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--ink-3)",padding:"14px 0",textTransform:"uppercase",letterSpacing:"0.08em"}}>No notes yet</div>
          ) : (c.notes||[]).map((n,i)=>(
            <div className="note" key={i}>
              <div className="meta"><span>{n.by}</span><span>{n.at}</span></div>
              <div className="text">{n.text}</div>
            </div>
          ))}
        </div>

        <div className="section">
          <div className="section-title"><span>Resume & Links</span></div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <label style={{cursor:"pointer"}}>
              <div className="btn" style={{justifyContent:"flex-start"}}>
                <Icon name="fileText" className="icon-sm"/>
                {c.resumeName||"Upload resume / PDF"}
              </div>
              <input type="file" accept=".pdf,.doc,.docx" style={{display:"none"}} onChange={e=>{if(e.target.files[0]) { onUpdate({...c,resumeName:e.target.files[0].name}); showToast(`${e.target.files[0].name} attached`); }}}/>
            </label>
            {Object.entries(c.links||{}).map(([k,v])=>(
              <a key={k} href={v.startsWith("http")||v.startsWith("mailto")?v:`https://${v}`} target="_blank" rel="noopener" className="btn" style={{justifyContent:"flex-start",textTransform:"capitalize"}}>
                <Icon name="link" className="icon-sm"/>{k} · {v}
              </a>
            ))}
          </div>
        </div>

        {/* color picker in edit mode */}
        {editMode && (
          <div className="section">
            <div className="section-title"><span>Profile color</span></div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {COLORS.map(col=>(
                <button key={col} onClick={()=>sd("color",col)} style={{width:28,height:28,borderRadius:"50%",background:col,border:draft.color===col?"3px solid var(--ink)":"2px solid transparent",cursor:"pointer",transition:"all .1s"}}/>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* MODALS (view mode only) */}
      {activePiece && !editMode && (
        <div className="modal" onClick={()=>setActivePiece(null)}>
          <div className="modal-inner" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div>
                <div style={{fontFamily:"var(--mono)",fontSize:10,textTransform:"uppercase",letterSpacing:"0.14em",color:"var(--ink-3)"}}>{c.name} · {activePiece.type}</div>
                <div style={{fontFamily:"var(--serif)",fontSize:26,marginTop:4,letterSpacing:"-0.015em"}}>{activePiece.label}</div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button className="btn icon" onClick={()=>handlePieceKey(-1)}><Icon name="arrowLeft" className="icon-sm"/></button>
                <button className="btn icon" onClick={()=>handlePieceKey(1)}><Icon name="arrowRight" className="icon-sm"/></button>
                <button className="btn icon" onClick={()=>setActivePiece(null)}><Icon name="x" className="icon-sm"/></button>
              </div>
            </div>
            <div className="modal-body">
              <div className="modal-img" style={{background:`color-mix(in oklch,${c.color} 55%,var(--paper-3))`}}>
                {activePiece.image && <img src={activePiece.image} alt={activePiece.label} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",zIndex:2}}/>}
              </div>
              <div className="modal-meta-row">
                <div className="m-item"><div className="k">Client</div><div className="v">{activePiece.client}</div></div>
                <div className="m-item"><div className="k">Year</div><div className="v">{activePiece.year}</div></div>
                <div className="m-item"><div className="k">Type</div><div className="v" style={{textTransform:"capitalize"}}>{activePiece.type}</div></div>
                <div className="m-item" style={{flex:1,minWidth:280}}><div className="k">Description</div><div className="v" style={{fontSize:13,color:"var(--ink-2)"}}>{activePiece.desc}</div></div>
              </div>
            </div>
          </div>
        </div>
      )}

      {editingPiece && editMode && (
        <PieceEditModal
          piece={editingPiece.piece}
          isNew={editingPiece.isNew}
          candidateColor={draft.color}
          onSave={(p)=>savePiece(p, editingPiece.isNew ? -1 : editingPiece.index)}
          onDelete={()=>!editingPiece.isNew&&deletePiece(editingPiece.index)}
          onClose={()=>setEditingPiece(null)}
        />
      )}

      {modal==="reach" && (
        <div className="modal" onClick={()=>setModal(null)}>
          <div className="modal-inner md" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">

/* ── ROSTER ── */
const Roster = ({ candidates, view, setView, onOpen, onToggleStar, filterState, setFilterState, currentNav, disciplines, onAddCandidate, showToast }) => {
  const filtered = useMemo(() => {
    return candidates.filter(c=>{
      if(filterState.query){const q=filterState.query.toLowerCase();const hay=[c.name,c.discipline,...(c.tags||[]),...(c.tools||[]),c.location,c.summary].join(" ").toLowerCase();if(!hay.includes(q))return false;}
      if(filterState.discipline&&c.discipline!==filterState.discipline)return false;
      if(filterState.availability&&c.availability!==filterState.availability)return false;
      if(filterState.minYrs&&c.yrs<filterState.minYrs)return false;
      if(filterState.stars&&c.stars<filterState.stars)return false;
      if(currentNav==="shortlist"&&!c.shortlist)return false;
      if(currentNav==="archived"&&c.stage!=="Archived")return false;
      if(currentNav==="pipeline"&&(c.stage==="Archived"||c.stage==="Sourced"))return false;
      return true;
    }).sort((a,b)=>{
      if(filterState.sort==="recent")return a.lastActive.localeCompare(b.lastActive);
      if(filterState.sort==="yrs")return b.yrs-a.yrs;
      if(filterState.sort==="salary")return b.salaryMin-a.salaryMin;
      if(filterState.sort==="stars")return b.stars-a.stars;
      return a.name.localeCompare(b.name);
    });
  },[candidates,filterState,currentNav]);

  const pageMeta = {
    all:{eyebrow:"Your roster",title:"All candidates",sub:"Everyone you've saved — filter, sort, and open any candidate for a full portfolio review."},
    shortlist:{eyebrow:"Starred",title:"Shortlist",sub:"The candidates you're keeping close."},
    pipeline:{eyebrow:"In motion",title:"Active pipeline",sub:"Candidates currently moving through screening, interviews, or offer."},
    archived:{eyebrow:"Archive",title:"Reviewed previously",sub:"Candidates you've archived — still searchable and restorable."},
  }[currentNav]||{eyebrow:"Your roster",title:"All candidates",sub:""};

  const exportCSV = () => {
    const headers=["Name","Discipline","Location","Years","Availability","Salary","Rate","Stage","Stars","Tags","Tools"];
    const rows=filtered.map(c=>[c.name,c.discipline,c.location,c.yrs,c.availability,c.salary,c.rate,c.stage,c.stars,(c.tags||[]).join("|"),(c.tools||[]).join("|")].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","));
    const csv=[headers.join(","),...rows].join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="roladex-candidates.csv";a.click();
    showToast("CSV exported");
  };

  const set=(k,v)=>setFilterState(s=>({...s,[k]:s[k]===v?null:v}));
  const anyFilter=filterState.discipline||filterState.availability||filterState.minYrs||filterState.stars;

  return (
    <>
      <div className="page-header">
        <div>
          <div className="page-eyebrow">{pageMeta.eyebrow}</div>
          <h1 className="page-title">{pageMeta.title}</h1>
          <div className="page-sub">{pageMeta.sub}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:10}}>
          <div className="page-meta">{filtered.length} / {candidates.length} candidates</div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn" onClick={exportCSV}><Icon name="download" className="icon-sm"/>Export CSV</button>
            <button className="btn accent" onClick={onAddCandidate}><Icon name="plus" className="icon-sm"/>Add candidate</button>
          </div>
        </div>
      </div>
      <div className="toolbar">
        <div className="seg">
          <button className={view==="grid"?"active":""} onClick={()=>setView("grid")}><Icon name="grid" className="icon-sm"/>Grid</button>
          <button className={view==="list"?"active":""} onClick={()=>setView("list")}><Icon name="list" className="icon-sm"/>List</button>
        </div>
        <div className="divider"/>
        <select className="filter-pill" value={filterState.sort} onChange={e=>setFilterState(s=>({...s,sort:e.target.value}))} style={{cursor:"pointer",paddingRight:22}}>
          <option value="name">Sort: Name A–Z</option>
          <option value="recent">Sort: Recently active</option>
          <option value="yrs">Sort: Experience</option>
          <option value="salary">Sort: Comp expectation</option>
          <option value="stars">Sort: Rating</option>
        </select>
        {anyFilter&&<button className="btn sm ghost" onClick={()=>setFilterState(s=>({...s,discipline:null,availability:null,minYrs:null,stars:null}))}><Icon name="x" className="icon-sm"/>Clear filters</button>}
      </div>
      <div className="filter-bar">
        <span className="label-tiny">Discipline</span>
        {disciplines.map(d=><button key={d} className={"filter-pill"+(filterState.discipline===d?" active":"")} onClick={()=>set("discipline",d)}>{d}</button>)}
      </div>
      <div className="filter-bar">
        <span className="label-tiny">Availability</span>
        {["open","passive","closed"].map(a=><button key={a} className={"filter-pill"+(filterState.availability===a?" active":"")} onClick={()=>set("availability",a)}>{a[0].toUpperCase()+a.slice(1)}</button>)}
        <span className="label-tiny" style={{marginLeft:14}}>Min. years</span>
        {[3,5,8,10].map(y=><button key={y} className={"filter-pill"+(filterState.minYrs===y?" active":"")} onClick={()=>set("minYrs",y)}>{y}+ yrs</button>)}
        <span className="label-tiny" style={{marginLeft:14}}>Rating</span>
        {[3,4,5].map(s=><button key={s} className={"filter-pill"+(filterState.stars===s?" active":"")} onClick={()=>set("stars",s)}>{"★".repeat(s)}+</button>)}
      </div>
      {filtered.length===0 ? <div className="empty">No candidates match these filters</div>
      : view==="grid" ? <div className="grid">{filtered.map(c=><CandidateCard key={c.id} c={c} onOpen={onOpen} onToggleStar={onToggleStar}/>)}</div>
      : <table className="list-table"><thead><tr><th>Name</th><th>Discipline</th><th>Exp.</th><th>Availability</th><th>Comp</th><th>Rating</th><th>Stage</th><th>Active</th></tr></thead><tbody>{filtered.map(c=><CandidateRow key={c.id} c={c} onOpen={onOpen} onToggleStar={onToggleStar}/>)}</tbody></table>}
    </>
  );
};
