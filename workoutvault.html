<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nak Muay — Training Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f11;
  --bg2: #141518;
  --bg3: #1c1d22;
  --card: #1a1b20;
  --card2: #22232a;
  --border: #2a2b33;
  --border2: #33343e;
  --accent: #e8533a;
  --accent2: #ff7055;
  --gold: #c9a84c;
  --gold2: #f0c96e;
  --teal: #3ab8c8;
  --text: #e8e9ef;
  --text2: #9a9baa;
  --text3: #5a5b6a;
  --radius: 12px;
  --radius-sm: 8px;
  --nav-h: 64px;
  --font-display: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body)}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}
.page{display:none;flex:1;overflow-y:auto;padding:16px 16px calc(var(--nav-h) + 20px)}
.page.active{display:block}

nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;height:var(--nav-h);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:9px;font-family:var(--font-mono);letter-spacing:.05em;text-transform:uppercase;border:none;background:none;transition:color .2s;padding:8px 4px}
.nav-btn svg{width:20px;height:20px;transition:transform .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn.active svg{transform:scale(1.1)}
.nav-btn:hover{color:var(--text2)}

.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:8px}
.page-title{font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:-.02em}
.page-subtitle{font-size:12px;color:var(--text3);font-family:var(--font-mono);margin-top:2px}
.header-actions{display:flex;gap:8px}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-accent{border-left:3px solid var(--accent)}
.card-gold{border-left:3px solid var(--gold)}
.card-teal{border-left:3px solid var(--teal)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-title{font-family:var(--font-display);font-weight:700;font-size:15px;line-height:1.3}
.card-meta{font-size:11px;color:var(--text3);font-family:var(--font-mono);margin-top:4px}
.card-body{font-size:13px;color:var(--text2);line-height:1.6}
.card-actions{display:flex;gap:8px;margin-top:12px}

.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-family:var(--font-mono);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.tag-default{background:var(--bg3);color:var(--text3)}
.tag-accent{background:rgba(232,83,58,.15);color:var(--accent2)}
.tag-gold{background:rgba(201,168,76,.15);color:var(--gold2)}
.tag-teal{background:rgba(58,184,200,.15);color:var(--teal)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid transparent}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--card2);color:var(--text);border-color:var(--border)}
.btn-secondary:hover{border-color:var(--border2)}
.btn-ghost{background:none;color:var(--text2);border-color:var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{padding:8px;border-radius:var(--radius-sm);background:var(--card2);border:1px solid var(--border);cursor:pointer;color:var(--text2);transition:all .2s;display:inline-flex;align-items:center}
.btn-icon:hover{color:var(--text);border-color:var(--border2)}

.fav-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);transition:color .2s;padding:2px;line-height:1}
.fav-btn.active{color:var(--gold)}
.fav-btn:hover{color:var(--gold2)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;backdrop-filter:blur(4px);align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-top:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:480px;margin:0 auto;padding:24px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:var(--font-display);font-weight:800;font-size:20px;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-family:var(--font-mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:14px;padding:10px 12px;transition:border-color .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:10px;margin-top:20px}
.form-actions .btn{flex:1;justify-content:center}

.search-bar{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px}
.search-bar input{flex:1;background:none;border:none;color:var(--text);font-family:var(--font-body);font-size:14px}
.search-bar input:focus{outline:none}
.search-bar input::placeholder{color:var(--text3)}
.search-bar svg{color:var(--text3);width:16px;height:16px;flex-shrink:0}

.filter-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.filter-pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-family:var(--font-mono);cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text3);transition:all .2s;white-space:nowrap}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pill:hover:not(.active){color:var(--text2);border-color:var(--border2)}

.dash-greeting{margin-bottom:24px}
.dash-greeting h1{font-family:var(--font-display);font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.dash-greeting p{color:var(--text3);font-size:12px;font-family:var(--font-mono);margin-top:6px}
.accent-word{color:var(--accent)}

.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.qa-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;text-align:left;color:var(--text);font-family:var(--font-body)}
.qa-btn:hover{border-color:var(--accent);background:var(--card2)}
.qa-btn .qa-icon{font-size:20px;margin-bottom:6px;display:block}
.qa-btn .qa-label{font-size:12px;font-weight:500;display:block}
.qa-btn .qa-sub{font-size:10px;color:var(--text3);font-family:var(--font-mono);display:block;margin-top:2px}

.section-label{font-size:10px;font-family:var(--font-mono);color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.stat-num{font-family:var(--font-display);font-size:24px;font-weight:800}
.stat-label{font-size:9px;font-family:var(--font-mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.day-cell{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 2px;text-align:center;min-height:56px;font-size:9px;font-family:var(--font-mono)}
.day-cell .day-date{color:var(--text2);font-size:12px;font-weight:500;margin-bottom:4px}
.day-cell .day-dot{width:6px;height:6px;border-radius:50%;margin:2px auto}
.day-cell.has-workout{border-color:var(--accent)}
.day-cell.has-mt{border-color:var(--gold)}
.day-cell.has-both{border-color:var(--teal)}
.day-cell.today{background:var(--card2)}

.empty-state{text-align:center;padding:40px 20px}
.empty-state .empty-icon{font-size:36px;margin-bottom:12px}
.empty-state p{color:var(--text3);font-size:13px}

.detail-grid{display:grid;gap:8px;margin-top:10px}
.detail-item{display:flex;gap:8px}
.detail-key{font-size:11px;font-family:var(--font-mono);color:var(--text3);text-transform:uppercase;min-width:80px;padding-top:1px;flex-shrink:0}
.detail-val{font-size:13px;color:var(--text2)}

.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center;padding:24px}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:360px}
.confirm-box h3{font-family:var(--font-display);font-weight:700;font-size:18px;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--text2);margin-bottom:20px}
.confirm-actions{display:flex;gap:10px}
.btn-danger{background:#6b1414;color:#ff6b6b;border:1px solid #8a1c1c}
.btn-danger:hover{background:#8a1c1c}

.toast{position:fixed;bottom:calc(var(--nav-h) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 16px;font-size:13px;color:var(--text);z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(min-width:480px){#app{border-left:1px solid var(--border);border-right:1px solid var(--border)}}
</style>
</head>
<body>
<div id="app">
<div class="page active" id="page-dashboard"></div>
<div class="page" id="page-workouts"></div>
<div class="page" id="page-muaythai"></div>
<div class="page" id="page-drills"></div>
<div class="page" id="page-sessions"></div>
<div class="page" id="page-calendar"></div>
<div class="page" id="page-planner"></div>

<nav>
  <button class="nav-btn active" data-page="dashboard" onclick="navigate('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Dash
  </button>
  <button class="nav-btn" data-page="workouts" onclick="navigate('workouts')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v6a6 6 0 0 0 12 0V4"/><line x1="6" y1="9" x2="2" y2="9"/><line x1="22" y1="9" x2="18" y2="9"/></svg>
    Workout
  </button>
  <button class="nav-btn" data-page="muaythai" onclick="navigate('muaythai')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    MT Notes
  </button>
  <button class="nav-btn" data-page="drills" onclick="navigate('drills')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
    Drills
  </button>
  <button class="nav-btn" data-page="sessions" onclick="navigate('sessions')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Sessions
  </button>
  <button class="nav-btn" data-page="calendar" onclick="navigate('calendar')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Week
  </button>
  <button class="nav-btn" data-page="planner" onclick="navigate('planner')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
    Sunday
  </button>
</nav>
</div>

<!-- WORKOUT MODAL -->
<div class="modal-overlay" id="modal-workout">
  <div class="modal">
    <div class="modal-title" id="modal-workout-title">Add Workout</div>
    <input type="hidden" id="workout-edit-id">
    <div class="form-row">
      <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" id="workout-date"></div>
      <div class="form-group"><label class="form-label">Duration</label><input type="text" class="form-input" id="workout-duration" placeholder="45 min"></div>
    </div>
    <div class="form-group"><label class="form-label">Type</label>
      <select class="form-select" id="workout-type">
        <option>Strength</option><option>Conditioning</option><option>Assault Bike</option>
        <option>Mobility</option><option>Recovery</option><option>Run</option>
        <option>Circuit</option><option>Muay Thai Conditioning</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Title</label><input type="text" class="form-input" id="workout-title" placeholder="e.g. Upper Pull Session"></div>
    <div class="form-group"><label class="form-label">Exercises / Content</label><textarea class="form-textarea" id="workout-content" placeholder="List exercises, sets, reps..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Intensity</label>
        <select class="form-select" id="workout-intensity">
          <option value="">—</option><option>Easy</option><option>Moderate</option><option>Hard</option><option>Max</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><input type="text" class="form-input" id="workout-notes" placeholder="Optional"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-workout')">Cancel</button>
      <button class="btn btn-primary" onclick="saveWorkout()">Save</button>
    </div>
  </div>
</div>

<!-- MT NOTE MODAL -->
<div class="modal-overlay" id="modal-mt">
  <div class="modal">
    <div class="modal-title" id="modal-mt-title">Add MT Note</div>
    <input type="hidden" id="mt-edit-id">
    <div class="form-group"><label class="form-label">Title</label><input type="text" class="form-input" id="mt-title" placeholder="e.g. Jab Hip Rotation"></div>
    <div class="form-group"><label class="form-label">Category</label>
      <select class="form-select" id="mt-category">
        <option>Punching</option><option>Kicks</option><option>Defense</option><option>Footwork</option>
        <option>Clinch</option><option>Timing</option><option>Counters</option><option>Coaching</option>
        <option>Beginner Class</option><option>Strategy</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Note Content</label><textarea class="form-textarea" id="mt-content" placeholder="Write the technique detail, reminder, or insight..."></textarea></div>
    <div class="form-group"><label class="form-label">Coaching Cue (optional)</label><input type="text" class="form-input" id="mt-cue" placeholder="e.g. 'Snap the hip, not the arm'"></div>
    <div class="form-group"><label class="form-label">Tags (comma-separated)</label><input type="text" class="form-input" id="mt-tags" placeholder="e.g. jab, beginner, mechanics"></div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-mt')">Cancel</button>
      <button class="btn btn-primary" onclick="saveMTNote()">Save</button>
    </div>
  </div>
</div>

<!-- DRILL MODAL -->
<div class="modal-overlay" id="modal-drill">
  <div class="modal">
    <div class="modal-title" id="modal-drill-title">Add Drill / Combo</div>
    <input type="hidden" id="drill-edit-id">
    <div class="form-group"><label class="form-label">Title</label><input type="text" class="form-input" id="drill-title" placeholder="e.g. Jab–Cross–Low Kick"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Type</label>
        <select class="form-select" id="drill-type">
          <option>Combo</option><option>Drill</option><option>Padwork</option><option>Partner Drill</option><option>Coaching Drill</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Difficulty</label>
        <select class="form-select" id="drill-difficulty">
          <option value="">—</option><option>Beginner</option><option>Intermediate</option><option>Advanced</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Category</label>
      <select class="form-select" id="drill-category">
        <option>Punching</option><option>Kicks</option><option>Defense</option><option>Clinch</option>
        <option>Counters</option><option>Footwork</option><option>Mixed</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Steps / Details</label><textarea class="form-textarea" id="drill-steps" placeholder="Step-by-step breakdown..."></textarea></div>
    <div class="form-group"><label class="form-label">Purpose / What It Develops</label><input type="text" class="form-input" id="drill-purpose" placeholder="e.g. Entry timing, hip engagement"></div>
    <div class="form-group"><label class="form-label">Tags</label><input type="text" class="form-input" id="drill-tags" placeholder="beginner, power, entry"></div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-drill')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDrill()">Save</button>
    </div>
  </div>
</div>

<!-- SESSION MODAL -->
<div class="modal-overlay" id="modal-session">
  <div class="modal">
    <div class="modal-title" id="modal-session-title">Add Session Log</div>
    <input type="hidden" id="session-edit-id">
    <div class="form-row">
      <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" id="session-date"></div>
      <div class="form-group"><label class="form-label">Type</label>
        <select class="form-select" id="session-type">
          <option>Class</option><option>Sparring</option><option>Padwork</option><option>Bagwork</option>
          <option>Coaching</option><option>Private Lesson</option><option>Open Gym</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Training Partner (optional)</label><input type="text" class="form-input" id="session-partner" placeholder="e.g. Coach Dan, Solo"></div>
    <div class="form-group"><label class="form-label">What I Worked On</label><textarea class="form-textarea" id="session-worked" placeholder="Main focus and content..."></textarea></div>
    <div class="form-group"><label class="form-label">What Felt Good</label><input type="text" class="form-input" id="session-good" placeholder="Wins from this session"></div>
    <div class="form-group"><label class="form-label">Needs Work</label><input type="text" class="form-input" id="session-work" placeholder="What to improve"></div>
    <div class="form-group"><label class="form-label">Next Focus</label><input type="text" class="form-input" id="session-next" placeholder="Priority for next session"></div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="session-notes" placeholder="Anything else..."></textarea></div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-session')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSession()">Save</button>
    </div>
  </div>
</div>

<!-- PLAN MODAL -->
<div class="modal-overlay" id="modal-plan">
  <div class="modal">
    <div class="modal-title" id="modal-plan-title">Sunday Class Plan</div>
    <input type="hidden" id="plan-edit-id">
    <div class="form-row">
      <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" id="plan-date"></div>
      <div class="form-group"><label class="form-label">Class Focus</label><input type="text" class="form-input" id="plan-focus" placeholder="e.g. Jab Mechanics"></div>
    </div>
    <div class="form-group"><label class="form-label">Warmup</label><textarea class="form-textarea" id="plan-warmup" placeholder="Warmup routine..."></textarea></div>

<script>
const KEYS={workouts:'nm_workouts',mtNotes:'nm_mtnotes',drills:'nm_drills',sessions:'nm_sessions',plans:'nm_plans'};
function load(k){try{return JSON.parse(localStorage.getItem(k))||[]}catch{return[]}}
function save(k,d){localStorage.setItem(k,JSON.stringify(d))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function today(){return new Date().toISOString().split('T')[0]}
function offsetDate(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]}
function fmt(s){if(!s)return'';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function ago(s){if(!s)return'';const diff=Math.round((Date.now()-new Date(s+'T00:00:00'))/86400000);if(diff===0)return'Today';if(diff===1)return'Yesterday';if(diff<0)return`in ${Math.abs(diff)}d`;return`${diff}d ago`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function catTag(c){
  const m={Punching:'tag-accent',Kicks:'tag-gold',Defense:'tag-teal',Footwork:'tag-teal',Clinch:'tag-accent',Timing:'tag-default',Counters:'tag-gold',Coaching:'tag-default','Beginner Class':'tag-gold',Strategy:'tag-teal',Combo:'tag-accent',Drill:'tag-default',Padwork:'tag-gold','Partner Drill':'tag-teal','Coaching Drill':'tag-teal',Mixed:'tag-default'};
  return`<span class="tag ${m[c]||'tag-default'}">${esc(c)}</span>`
}

    {id:uid(),title:'Jab — Hip & Shoulder Sequencing',category:'Punching',content:'The jab generates power from hip rotation, not arm extension. Lead hip pops forward first, which pulls the shoulder and drives the fist. Keep the rear hand glued to the chin. Weight transfers slightly onto the lead foot as the jab extends. Reset by pulling the hip back — this naturally retracts the jab and resets guard.',cue:'"Shoot the hip, the hand follows."',tags:['jab','mechanics','beginners'],favorite:true,date:offsetDate(-10),createdAt:Date.now()-1000000},

    {id:uid(),title:'Beginner Jab Mechanics Drill',type:'Coaching Drill',category:'Punching',difficulty:'Beginner',steps:'1. Start: both hands at chin, relaxed guard\n2. Partner holds pad flat at chin height\n3. Cue hip pop first — "shoot the hip"\n4. Fist follows naturally — no wind-up\n5. Return to guard — retract before guard drops\n6. 10 reps each side, shadow then pad',purpose:'Teaching jab mechanics to beginners — isolates hip-hand connection',tags:['beginner','coaching','jab','mechanics'],favorite:false,createdAt:Date.now()-300000}
  ])}
  if(!load(KEYS.sessions).length){save(KEYS.sessions,[
    {id:uid(),date:offsetDate(-2),type:'Padwork',partner:'Coach Lek',worked:'Jab-cross rhythm drills. Cross-hook-kick sequences. Worked on getting the rear hip through on the cross. Spent last 10 mins on teep timing.',good:'Cross felt more connected than last week. Hip starting to engage naturally.',needsWork:'Teep is still too slow off the back foot. Guard drops after the hook.',next:'Drill cross-hook-kick 100x per session. Isolate teep rechamber speed.',notes:'3 rounds padwork, 2 rounds shadow, 1 round bag',createdAt:Date.now()-150000},
    {id:uid(),date:offsetDate(-5),type:'Class',partner:'Group class',worked:'Beginner fundamentals: stance, guard, jab mechanics, cross basics. Ran the jab mechanics drill. Finished with 2 rounds partner padwork.',good:'New students picked up the hip cue quickly. Good energy in class.',needsWork:'Need a better warmup drill that covers footwork. Transitions between stations too slow.',next:'Plan better station flow for Sunday. Add movement warmup.',notes:'8 students. Mix of complete beginners and 2 month returners.',createdAt:Date.now()-450000}
  ])}
  if(!load(KEYS.plans).length){save(KEYS.plans,[

  ])}
}

// NAV
let currentPage='dashboard';
function navigate(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

  document.getElementById('page-'+page).classList.add('active');

}

function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');pendingDelete=null}

// ── DASHBOARD ──

    <button class="qa-btn" onclick="openAddMT()"><span class="qa-icon">🥊</span><span class="qa-label">MT Note</span><span class="qa-sub">Save a technique</span></button>
    <button class="qa-btn" onclick="openAddDrill()"><span class="qa-icon">🎯</span><span class="qa-label">Drill / Combo</span><span class="qa-sub">Add to library</span></button>
    <button class="qa-btn" onclick="openAddSession()"><span class="qa-icon">📋</span><span class="qa-label">Session Log</span><span class="qa-sub">Record what happened</span></button>
    <button class="qa-btn" onclick="openAddPlan()"><span class="qa-icon">📅</span><span class="qa-label">Sunday Class</span><span class="qa-sub">Plan a class</span></button>
  </div>

    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${thisWW}</div><div class="stat-label">Workouts</div></div>

  </div>`;

  if(W[0])h+=`<div class="section-label">Last Workout</div><div class="card card-accent"><div class="card-header"><div><div class="card-title">${esc(W[0].title)}</div><div class="card-meta">${ago(W[0].date)} · ${esc(W[0].type)} · ${esc(W[0].duration||'')}</div></div></div><div class="card-body">${esc((W[0].content||'').split('\n')[0])}</div></div>`;
  if(S[0])h+=`<div class="section-label">Last Session</div><div class="card card-teal"><div class="card-header"><div><div class="card-title">${esc(S[0].type)} — ${ago(S[0].date)}</div><div class="card-meta">${esc(S[0].partner||'Solo')}</div></div></div><div class="card-body">${esc((S[0].worked||'').substring(0,120))}…</div></div>`;
  if(nextPlan)h+=`<div class="section-label">Next Sunday Class</div><div class="card card-gold"><div class="card-header"><div><div class="card-title">${esc(nextPlan.focus)}</div><div class="card-meta">${fmt(nextPlan.date)}</div></div></div><div class="card-body">${esc((nextPlan.technique||'').substring(0,100))}</div></div>`;
  if(favD.length){h+=`<div class="section-label">Favourite Drills</div>`;favD.slice(0,3).forEach(d=>{h+=`<div class="card"><div class="card-header"><div><div class="card-title">${esc(d.title)}</div><div class="card-meta">${esc(d.type)}</div></div>${catTag(d.category)}</div><div class="card-body">${esc(d.purpose||'')}</div></div>`})}
  if(favN.length){h+=`<div class="section-label">Favourite Cues</div>`;favN.slice(0,3).forEach(n=>{h+=`<div class="card"><div class="card-header"><div><div class="card-title">${esc(n.title)}</div></div>${catTag(n.category)}</div>${n.cue?`<div class="card-body" style="color:var(--gold2);font-style:italic">${esc(n.cue)}</div>`:''}</div>`})}
  document.getElementById('page-dashboard').innerHTML=h;
}

// ── WORKOUTS ──
let wF='All',wS='';
function renderWorkouts(){
  let D=load(KEYS.workouts).sort((a,b)=>b.date.localeCompare(a.date));
  const types=['All',...new Set(D.map(w=>w.type))];
  if(wF!=='All')D=D.filter(w=>w.type===wF);
  if(wS)D=D.filter(w=>(w.title+w.content+w.type+w.notes).toLowerCase().includes(wS.toLowerCase()));
  let h=`<div class="page-header"><div><div class="page-title">Workouts</div><div class="page-subtitle">${load(KEYS.workouts).length} LOGGED</div></div><button class="btn btn-primary btn-sm" onclick="openAddWorkout()">+ Add</button></div>
  <div class="search-bar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search workouts..." oninput="wS=this.value;renderWorkouts()" value="${esc(wS)}"></div>
  <div class="filter-pills">${types.map(t=>`<div class="pill${wF===t?' active':''}" onclick="wF='${esc(t)}';renderWorkouts()">${esc(t)}</div>`).join('')}</div>`;
  if(!D.length)h+=`<div class="empty-state"><div class="empty-icon">🏋️</div><p>No workouts yet. Add your first one.</p></div>`;
  else D.forEach(w=>{h+=`<div class="card card-accent"><div class="card-header"><div><div class="card-title">${esc(w.title)}</div><div class="card-meta">${fmt(w.date)} · ${esc(w.duration||'')} ${w.intensity?'· '+esc(w.intensity):''}</div></div><span class="tag tag-accent">${esc(w.type)}</span></div><div class="card-body" style="white-space:pre-line">${esc(w.content||'')}</div>${w.notes?`<div style="margin-top:8px;font-size:12px;color:var(--text3)">📝 ${esc(w.notes)}</div>`:''}<div class="card-actions"><button class="btn btn-ghost btn-sm" onclick="editWorkout('${w.id}')">Edit</button><button class="btn btn-ghost btn-sm" style="color:var(--text3)" onclick="askDelete(()=>deleteEntry(KEYS.workouts,'${w.id}',renderWorkouts))">Delete</button></div></div>`});
  document.getElementById('page-workouts').innerHTML=h;
}
function openAddWorkout(){document.getElementById('modal-workout-title').textContent='Add Workout';document.getElementById('workout-edit-id').value='';document.getElementById('workout-date').value=today();document.getElementById('workout-type').value='Strength';['workout-title','workout-content','workout-duration','workout-notes'].forEach(id=>document.getElementById(id).value='');document.getElementById('workout-intensity').value='';openModal('modal-workout')}
function editWorkout(id){const w=load(KEYS.workouts).find(x=>x.id===id);if(!w)return;document.getElementById('modal-workout-title').textContent='Edit Workout';document.getElementById('workout-edit-id').value=id;document.getElementById('workout-date').value=w.date;document.getElementById('workout-type').value=w.type;document.getElementById('workout-title').value=w.title;document.getElementById('workout-content').value=w.content||'';document.getElementById('workout-duration').value=w.duration||'';document.getElementById('workout-intensity').value=w.intensity||'';document.getElementById('workout-notes').value=w.notes||'';openModal('modal-workout')}
function saveWorkout(){
  const id=document.getElementById('workout-edit-id').value;
  const e={id:id||uid(),date:document.getElementById('workout-date').value,type:document.getElementById('workout-type').value,title:document.getElementById('workout-title').value,content:document.getElementById('workout-content').value,duration:document.getElementById('workout-duration').value,intensity:document.getElementById('workout-intensity').value,notes:document.getElementById('workout-notes').value,createdAt:Date.now()};
  if(!e.title){toast('Please add a title');return}
  const D=load(KEYS.workouts);if(id){const i=D.findIndex(x=>x.id===id);if(i>=0){e.createdAt=D[i].createdAt;D[i]=e}}else D.push(e);
  save(KEYS.workouts,D);closeModal('modal-workout');toast(id?'Workout updated ✓':'Workout saved ✓');
  if(currentPage==='workouts')renderWorkouts();if(currentPage==='dashboard')renderDashboard();
}

// ── MT NOTES ──
let mF='All',mS='',mFav=false;

  let D=load(KEYS.mtNotes).sort((a,b)=>b.createdAt-a.createdAt);

  else D.forEach(n=>{h+=`<div class="card"><div class="card-header"><div style="flex:1"><div class="card-title">${esc(n.title)}</div><div class="card-meta">${esc(n.category)}</div></div><button class="fav-btn${n.favorite?' active':''}" onclick="toggleFav(KEYS.mtNotes,'${n.id}',renderMTNotes)">★</button></div><div class="card-body" style="margin-bottom:8px">${esc((n.content||'').substring(0,200))}${(n.content||'').length>200?'…':''}</div>${n.cue?`<div style="font-size:13px;color:var(--gold2);font-style:italic;margin-bottom:8px">${esc(n.cue)}</div>`:''}<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">${catTag(n.category)}${(n.tags||[]).map(t=>`<span class="tag tag-default">${esc(t)}</span>`).join('')}</div><div class="card-actions"><button class="btn btn-ghost btn-sm" onclick="editMTNote('${n.id}')">Edit</button><button class="btn btn-ghost btn-sm" style="color:var(--text3)" onclick="askDelete(()=>deleteEntry(KEYS.mtNotes,'${n.id}',renderMTNotes))">Delete</button></div></div>`});
  document.getElementById('page-muaythai').innerHTML=h;
}
function openAddMT(){document.getElementById('modal-mt-title').textContent='Add MT Note';document.getElementById('mt-edit-id').value='';['mt-title','mt-content','mt-cue','mt-tags'].forEach(id=>document.getElementById(id).value='');document.getElementById('mt-category').value='Punching';openModal('modal-mt')}

  if(currentPage==='muaythai')renderMTNotes();if(currentPage==='dashboard')renderDashboard();

function renderDrills(){

  const types=['All','Combo','Drill','Padwork','Partner Drill','Coaching Drill'];
  if(dFav)D=D.filter(d=>d.favorite);if(dF!=='All')D=D.filter(d=>d.type===dF);
  if(dS)D=D.filter(d=>(d.title+d.steps+d.purpose+(d.tags||[]).join(' ')).toLowerCase().includes(dS.toLowerCase()));
  let h=`<div class="page-header"><div><div class="page-title">Library</div><div class="page-subtitle">${load(KEYS.drills).length} ENTRIES</div></div><div class="header-actions"><button class="btn-icon" onclick="dFav=!dFav;renderDrills()" style="${dFav?'color:var(--gold);border-color:var(--gold)':''}">⭐</button><button class="btn btn-primary btn-sm" onclick="openAddDrill()">+ Add</button></div></div>
  <div class="search-bar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search drills, combos..." oninput="dS=this.value;renderDrills()" value="${esc(dS)}"></div>
  <div class="filter-pills">${types.map(t=>`<div class="pill${dF===t?' active':''}" onclick="dF='${esc(t)}';renderDrills()">${esc(t)}</div>`).join('')}</div>`;
  if(!D.length)h+=`<div class="empty-state"><div class="empty-icon">🎯</div><p>No drills found. Add your first one.</p></div>`;
  else D.forEach(d=>{h+=`<div class="card"><div class="card-header"><div style="flex:1"><div class="card-title">${esc(d.title)}</div><div class="card-meta">${esc(d.type)}${d.difficulty?' · '+esc(d.difficulty):''}</div></div><button class="fav-btn${d.favorite?' active':''}" onclick="toggleFav(KEYS.drills,'${d.id}',renderDrills)">★</button></div>${d.purpose?`<div style="font-size:12px;color:var(--teal);margin-bottom:8px">↳ ${esc(d.purpose)}</div>`:''}<div class="card-body" style="white-space:pre-line">${esc(d.steps||'')}</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">${catTag(d.category)}${(d.tags||[]).map(t=>`<span class="tag tag-default">${esc(t)}</span>`).join('')}</div><div class="card-actions"><button class="btn btn-ghost btn-sm" onclick="editDrill('${d.id}')">Edit</button><button class="btn btn-ghost btn-sm" style="color:var(--text3)" onclick="askDelete(()=>deleteEntry(KEYS.drills,'${d.id}',renderDrills))">Delete</button></div></div>`});
  document.getElementById('page-drills').innerHTML=h;
}
function openAddDrill(){document.getElementById('modal-drill-title').textContent='Add Drill / Combo';document.getElementById('drill-edit-id').value='';['drill-title','drill-steps','drill-purpose','drill-tags'].forEach(id=>document.getElementById(id).value='');document.getElementById('drill-type').value='Combo';document.getElementById('drill-difficulty').value='';document.getElementById('drill-category').value='Mixed';openModal('modal-drill')}
function editDrill(id){const d=load(KEYS.drills).find(x=>x.id===id);if(!d)return;document.getElementById('modal-drill-title').textContent='Edit Drill / Combo';document.getElementById('drill-edit-id').value=id;document.getElementById('drill-title').value=d.title;document.getElementById('drill-type').value=d.type;document.getElementById('drill-difficulty').value=d.difficulty||'';document.getElementById('drill-category').value=d.category;document.getElementById('drill-steps').value=d.steps||'';document.getElementById('drill-purpose').value=d.purpose||'';document.getElementById('drill-tags').value=(d.tags||[]).join(', ');openModal('modal-drill')}
function saveDrill(){
  const id=document.getElementById('drill-edit-id').value;
  const existing=id?load(KEYS.drills).find(x=>x.id===id):null;
  const e={id:id||uid(),title:document.getElementById('drill-title').value,type:document.getElementById('drill-type').value,difficulty:document.getElementById('drill-difficulty').value,category:document.getElementById('drill-category').value,steps:document.getElementById('drill-steps').value,purpose:document.getElementById('drill-purpose').value,tags:document.getElementById('drill-tags').value.split(',').map(t=>t.trim()).filter(Boolean),favorite:existing?existing.favorite:false,createdAt:existing?existing.createdAt:Date.now()};
  if(!e.title){toast('Please add a title');return}
  const D=load(KEYS.drills);if(id){const i=D.findIndex(x=>x.id===id);if(i>=0)D[i]=e}else D.push(e);
  save(KEYS.drills,D);closeModal('modal-drill');toast(id?'Entry updated ✓':'Entry saved ✓');
  if(currentPage==='drills')renderDrills();if(currentPage==='dashboard')renderDashboard();
}

// ── SESSIONS ──
let sF='All',sS='';
function renderSessions(){
  let D=load(KEYS.sessions).sort((a,b)=>b.date.localeCompare(a.date));
  const types=['All','Class','Sparring','Padwork','Bagwork','Coaching','Private Lesson','Open Gym'];
  if(sF!=='All')D=D.filter(s=>s.type===sF);
  if(sS)D=D.filter(s=>(s.worked+s.good+s.needsWork+s.next+s.notes+s.partner+s.type).toLowerCase().includes(sS.toLowerCase()));
  let h=`<div class="page-header"><div><div class="page-title">Sessions</div><div class="page-subtitle">${load(KEYS.sessions).length} LOGGED</div></div><button class="btn btn-primary btn-sm" onclick="openAddSession()">+ Add</button></div>
  <div class="search-bar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search sessions..." oninput="sS=this.value;renderSessions()" value="${esc(sS)}"></div>
  <div class="filter-pills">${types.map(t=>`<div class="pill${sF===t?' active':''}" onclick="sF='${esc(t)}';renderSessions()">${esc(t)}</div>`).join('')}</div>`;
  if(!D.length)h+=`<div class="empty-state"><div class="empty-icon">📋</div><p>No sessions yet. Log your first training session.</p></div>`;
  else D.forEach(s=>{h+=`<div class="card card-teal"><div class="card-header"><div><div class="card-title">${esc(s.type)}</div><div class="card-meta">${fmt(s.date)}${s.partner?' · '+esc(s.partner):''}</div></div><span class="tag tag-teal">${esc(s.type)}</span></div><div class="detail-grid">${s.worked?`<div class="detail-item"><div class="detail-key">Worked</div><div class="detail-val">${esc(s.worked)}</div></div>`:''} ${s.good?`<div class="detail-item"><div class="detail-key">✓ Good</div><div class="detail-val" style="color:var(--teal)">${esc(s.good)}</div></div>`:''} ${s.needsWork?`<div class="detail-item"><div class="detail-key">↑ Work</div><div class="detail-val" style="color:var(--accent2)">${esc(s.needsWork)}</div></div>`:''} ${s.next?`<div class="detail-item"><div class="detail-key">→ Next</div><div class="detail-val" style="color:var(--gold2)">${esc(s.next)}</div></div>`:''} ${s.notes?`<div class="detail-item"><div class="detail-key">Notes</div><div class="detail-val">${esc(s.notes)}</div></div>`:''}</div><div class="card-actions"><button class="btn btn-ghost btn-sm" onclick="editSession('${s.id}')">Edit</button><button class="btn btn-ghost btn-sm" style="color:var(--text3)" onclick="askDelete(()=>deleteEntry(KEYS.sessions,'${s.id}',renderSessions))">Delete</button></div></div>`});
  document.getElementById('page-sessions').innerHTML=h;
}
function openAddSession(){document.getElementById('modal-session-title').textContent='Add Session Log';document.getElementById('session-edit-id').value='';document.getElementById('session-date').value=today();document.getElementById('session-type').value='Class';['session-partner','session-worked','session-good','session-work','session-next','session-notes'].forEach(id=>document.getElementById(id).value='');openModal('modal-session')}
function editSession(id){const s=load(KEYS.sessions).find(x=>x.id===id);if(!s)return;document.getElementById('modal-session-title').textContent='Edit Session';document.getElementById('session-edit-id').value=id;document.getElementById('session-date').value=s.date;document.getElementById('session-type').value=s.type;document.getElementById('session-partner').value=s.partner||'';document.getElementById('session-worked').value=s.worked||'';document.getElementById('session-good').value=s.good||'';document.getElementById('session-work').value=s.needsWork||'';document.getElementById('session-next').value=s.next||'';document.getElementById('session-notes').value=s.notes||'';openModal('modal-session')}
function saveSession(){
  const id=document.getElementById('session-edit-id').value;
  const existing=id?load(KEYS.sessions).find(x=>x.id===id):null;
  const e={id:id||uid(),date:document.getElementById('session-date').value,type:document.getElementById('session-type').value,partner:document.getElementById('session-partner').value,worked:document.getElementById('session-worked').value,good:document.getElementById('session-good').value,needsWork:document.getElementById('session-work').value,next:document.getElementById('session-next').value,notes:document.getElementById('session-notes').value,createdAt:existing?existing.createdAt:Date.now()};
  if(!e.worked){toast('Please add what you worked on');return}
  const D=load(KEYS.sessions);if(id){const i=D.findIndex(x=>x.id===id);if(i>=0)D[i]=e}else D.push(e);
  save(KEYS.sessions,D);closeModal('modal-session');toast(id?'Session updated ✓':'Session logged ✓');
  if(currentPage==='sessions')renderSessions();if(currentPage==='dashboard')renderDashboard();
}

// ── CALENDAR ──
function renderCalendar(){
  const W=load(KEYS.workouts),S=load(KEYS.sessions);
  const now=new Date();
  const weeks=[];
  for(let w=3;w>=0;w--){
    const ws=new Date(now);ws.setDate(now.getDate()-now.getDay()-w*7);
    const days=[];
    for(let d=0;d<7;d++){const day=new Date(ws);day.setDate(ws.getDate()+d);const ds=day.toISOString().split('T')[0];days.push({date:day,ds,hasW:W.some(x=>x.date===ds),hasS:S.some(x=>x.date===ds)})}
    weeks.push(days);
  }
  const DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const wkStart=new Date(now);wkStart.setDate(now.getDate()-now.getDay());
  const thisWW=W.filter(w=>new Date(w.date+'T00:00:00')>=wkStart).length;
  const thisWS=S.filter(s=>new Date(s.date+'T00:00:00')>=wkStart).length;
  let h=`<div class="page-header"><div><div class="page-title">Training</div><div class="page-subtitle">WEEKLY OVERVIEW</div></div></div>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${thisWW}</div><div class="stat-label">This Wk Workouts</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--gold)">${thisWS}</div><div class="stat-label">This Wk MT</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--teal)">${W.length+S.length}</div><div class="stat-label">All Time</div></div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px;font-size:11px;font-family:var(--font-mono);color:var(--text3)">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block"></span>Workout</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--gold);display:inline-block"></span>MT Session</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--teal);display:inline-block"></span>Both</span>
  </div>
  <div class="week-grid">${DAYS.map(d=>`<div style="text-align:center;font-size:9px;font-family:var(--font-mono);color:var(--text3);text-transform:uppercase;padding:4px 0">${d}</div>`).join('')}</div>`;
  weeks.forEach(week=>{
    const label=week[0].date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    h+=`<div class="section-label" style="margin-top:12px">Week of ${label}</div><div class="week-grid">`;
    week.forEach(({date,ds,hasW,hasS})=>{
      const isToday=ds===today();
      const cls=hasW&&hasS?'has-both':hasW?'has-workout':hasS?'has-mt':'';
      h+=`<div class="day-cell ${cls}${isToday?' today':''}"><div class="day-date" style="color:${isToday?'var(--accent)':'var(--text2)'}">${date.getDate()}</div>${hasW&&hasS?'<div class="day-dot" style="background:var(--teal)"></div>':hasW?'<div class="day-dot" style="background:var(--accent)"></div>':hasS?'<div class="day-dot" style="background:var(--gold)"></div>':''}</div>`
    });
    const wc=week.filter(d=>d.hasW).length,sc=week.filter(d=>d.hasS).length;
    h+=`</div>`;
    if(wc||sc)h+=`<div style="font-size:11px;color:var(--text3);font-family:var(--font-mono);margin-bottom:4px">${wc?`<span style="color:var(--accent)">${wc} workout${wc>1?'s':''}</span> `:''}${sc?`<span style="color:var(--gold)">${sc} session${sc>1?'s':''}</span>`:''}</div>`;
  });
  h+=`<div class="section-label" style="margin-top:20px">Recent Activity</div>`;
  const recent=[...W.map(w=>({...w,_t:'Workout',_l:w.title})),...S.map(s=>({...s,_t:'Session',_l:s.type}))].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  if(!recent.length)h+=`<div class="empty-state"><div class="empty-icon">📅</div><p>No activity yet.</p></div>`;
  else recent.forEach(r=>{const col=r._t==='Workout'?'var(--accent)':'var(--gold)';h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)"><span style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></span><span style="font-size:12px;color:var(--text3);font-family:var(--font-mono);min-width:70px">${ago(r.date)}</span><span style="font-size:13px;color:var(--text);flex:1">${esc(r._l)}</span><span class="tag tag-default">${r._t}</span></div>`});
  document.getElementById('page-calendar').innerHTML=h;
}

// ── PLANNER ──
let pFav=false;
function nextSunday(){const d=new Date();const day=d.getDay();d.setDate(d.getDate()+(day===0?7:7-day));return d.toISOString().split('T')[0]}
function renderPlanner(){
  let D=load(KEYS.plans).sort((a,b)=>b.date.localeCompare(a.date));
  if(pFav)D=D.filter(p=>p.favorite);
  let h=`<div class="page-header"><div><div class="page-title">Sunday</div><div class="page-subtitle">CLASS PLANNER</div></div><div class="header-actions"><button class="btn-icon" onclick="pFav=!pFav;renderPlanner()" style="${pFav?'color:var(--gold);border-color:var(--gold)':''}">⭐</button><button class="btn btn-primary btn-sm" onclick="openAddPlan()">+ Plan</button></div></div>`;
  if(!D.length)h+=`<div class="empty-state"><div class="empty-icon">📅</div><p>No class plans yet. Create your first Sunday plan.</p></div>`;
  else D.forEach(p=>{h+=`<div class="card card-gold"><div class="card-header"><div style="flex:1"><div class="card-title">${esc(p.focus)}</div><div class="card-meta">${fmt(p.date)} ${p.date>=today()?'<span class="tag tag-gold" style="margin-left:6px">Upcoming</span>':''}</div></div><button class="fav-btn${p.favorite?' active':''}" onclick="toggleFav(KEYS.plans,'${p.id}',renderPlanner)">★</button></div>${p.technique?`<div style="font-size:12px;color:var(--gold2);margin-bottom:10px">🎯 ${esc(p.technique)}</div>`:''} ${p.warmup?`<div class="section-label">Warmup</div><div class="card-body" style="margin-bottom:12px;white-space:pre-line">${esc(p.warmup)}</div>`:''} ${p.drills?`<div class="section-label">Drills / Stations</div><div class="card-body" style="margin-bottom:12px;white-space:pre-line">${esc(p.drills)}</div>`:''} ${p.conditioning?`<div style="font-size:12px;color:var(--accent2);margin-bottom:8px">⚡ ${esc(p.conditioning)}</div>`:''} ${p.cues?`<div class="section-label">Coaching Cues</div><div style="font-style:italic;font-size:13px;color:var(--gold2);white-space:pre-line;margin-bottom:10px">${esc(p.cues)}</div>`:''} ${p.notes?`<div style="font-size:12px;color:var(--text3)">📝 ${esc(p.notes)}</div>`:''}<div class="card-actions"><button class="btn btn-ghost btn-sm" onclick="editPlan('${p.id}')">Edit</button><button class="btn btn-ghost btn-sm" onclick="reusePlan('${p.id}')">Reuse</button><button class="btn btn-ghost btn-sm" style="color:var(--text3)" onclick="askDelete(()=>deleteEntry(KEYS.plans,'${p.id}',renderPlanner))">Delete</button></div></div>`});
  document.getElementById('page-planner').innerHTML=h;
}
function openAddPlan(){document.getElementById('modal-plan-title').textContent='New Sunday Class Plan';document.getElementById('plan-edit-id').value='';document.getElementById('plan-date').value=nextSunday();['plan-focus','plan-warmup','plan-drills','plan-technique','plan-conditioning','plan-cues','plan-notes'].forEach(id=>document.getElementById(id).value='');openModal('modal-plan')}
function editPlan(id){const p=load(KEYS.plans).find(x=>x.id===id);if(!p)return;document.getElementById('modal-plan-title').textContent='Edit Class Plan';document.getElementById('plan-edit-id').value=id;document.getElementById('plan-date').value=p.date;document.getElementById('plan-focus').value=p.focus||'';document.getElementById('plan-warmup').value=p.warmup||'';document.getElementById('plan-drills').value=p.drills||'';document.getElementById('plan-technique').value=p.technique||'';document.getElementById('plan-conditioning').value=p.conditioning||'';document.getElementById('plan-cues').value=p.cues||'';document.getElementById('plan-notes').value=p.notes||'';openModal('modal-plan')}
function reusePlan(id){const p=load(KEYS.plans).find(x=>x.id===id);if(!p)return;document.getElementById('modal-plan-title').textContent='New Plan (from template)';document.getElementById('plan-edit-id').value='';document.getElementById('plan-date').value=nextSunday();document.getElementById('plan-focus').value=p.focus||'';document.getElementById('plan-warmup').value=p.warmup||'';document.getElementById('plan-drills').value=p.drills||'';document.getElementById('plan-technique').value=p.technique||'';document.getElementById('plan-conditioning').value=p.conditioning||'';document.getElementById('plan-cues').value=p.cues||'';document.getElementById('plan-notes').value=p.notes||'';openModal('modal-plan')}
function savePlan(){
  const id=document.getElementById('plan-edit-id').value;
  const existing=id?load(KEYS.plans).find(x=>x.id===id):null;
  const e={id:id||uid(),date:document.getElementById('plan-date').value,focus:document.getElementById('plan-focus').value,warmup:document.getElementById('plan-warmup').value,drills:document.getElementById('plan-drills').value,technique:document.getElementById('plan-technique').value,conditioning:document.getElementById('plan-conditioning').value,cues:document.getElementById('plan-cues').value,notes:document.getElementById('plan-notes').value,favorite:existing?existing.favorite:false,createdAt:existing?existing.createdAt:Date.now()};
  if(!e.focus){toast('Please add a class focus');return}
  const D=load(KEYS.plans);if(id){const i=D.findIndex(x=>x.id===id);if(i>=0)D[i]=e}else D.push(e);
  save(KEYS.plans,D);closeModal('modal-plan');toast(id?'Plan updated ✓':'Plan saved ✓');
  if(currentPage==='planner')renderPlanner();if(currentPage==='dashboard')renderDashboard();
}

// ── SHARED ──
function toggleFav(key,id,redraw){const D=load(key);const i=D.findIndex(x=>x.id===id);if(i>=0){D[i].favorite=!D[i].favorite;save(key,D)}redraw();if(currentPage==='dashboard')renderDashboard()}
function deleteEntry(key,id,redraw){save(key,load(key).filter(x=>x.id!==id));toast('Deleted');redraw();if(currentPage==='dashboard')renderDashboard()}

// ── INIT ──
seedIfEmpty();
renderDashboard();
</script>
</body>
</html>
